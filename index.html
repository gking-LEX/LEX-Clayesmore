<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f2f1ee;
  --surface:#ffffff;
  --surface2:#f8f7f4;
  --surface3:#eeede9;
  --border:#e0deda;
  --border2:#d0cfc9;
  --text:#1a1916;
  --text2:#5c5a55;
  --text3:#9c9a94;
  --accent:#2563eb;
  --accent-soft:#dbeafe;
  --green:#16a34a;
  --green-soft:#dcfce7;
  --amber:#d97706;
  --amber-soft:#fef3c7;
  --red:#dc2626;
  --red-soft:#fee2e2;
  --purple:#7c3aed;
  --purple-soft:#ede9fe;
  --radius:10px;
  --radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* Layout */
.shell{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:0;height:52px;position:sticky;top:0;z-index:50;}
.logo-mark{width:28px;height:28px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;letter-spacing:-0.02em;flex-shrink:0;}
.logo-text{font-weight:600;font-size:15px;letter-spacing:-0.02em;margin-left:10px;color:var(--text);}
.logo-text span{color:var(--text3);font-weight:400;}
.topbar-meta{margin-left:16px;font-size:11px;color:var(--text3);border-left:1px solid var(--border);padding-left:16px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.term-badge{background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}

/* Nav */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto;}
.nav::-webkit-scrollbar{height:0;}
.nav-btn{padding:10px 14px;font-size:12px;font-weight:500;color:var(--text2);background:transparent;border:none;cursor:pointer;font-family:var(--font);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:6px;}
.nav-btn:hover{color:var(--text);}
.nav-btn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.nav-icon{font-size:13px;opacity:.7;}

/* Main content */
.main{flex:1;padding:24px;max-width:1600px;margin:0 auto;width:100%;transition:padding .2s;}.main.fs-mode{padding:8px;max-width:100%;}
.page-header{margin-bottom:20px;}
.page-header h2{font-size:20px;font-weight:700;letter-spacing:-0.03em;color:var(--text);}
.page-header p{font-size:12px;color:var(--text3);margin-top:2px;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-pad{padding:16px;}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}

/* Stats row */
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:120px;box-shadow:var(--shadow);}
.stat-val{font-size:24px;font-weight:700;letter-spacing:-0.04em;color:var(--text);}
.stat-label{font-size:11px;color:var(--text3);margin-top:1px;font-weight:500;}
.stat-sub{font-size:10px;color:var(--text3);margin-top:4px;}

/* Tables */
.table-wrap{overflow:auto;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);width:100%;}
table{border-collapse:collapse;width:100%;font-size:12px;}
th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;color:var(--text);white-space:nowrap;}
th{background:var(--surface2);font-weight:600;font-size:11px;color:var(--text2);position:sticky;top:0;z-index:2;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.sticky-l{position:sticky;left:0;z-index:1;background:var(--surface);}
.sticky-lt{position:sticky;left:0;top:0;z-index:3;background:var(--surface2);}
tr:hover .sticky-l{background:var(--surface2);}

/* Form controls */
input,select,textarea{
  padding:6px 10px;background:var(--surface);color:var(--text);
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  font-size:12px;font-family:var(--font);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
textarea{resize:vertical;width:100%;}
label.field-label{font-size:11px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px;}

/* Buttons */
.btn{padding:6px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(37,99,235,.3);}
.btn-primary:hover{background:#1d4ed8;box-shadow:0 2px 6px rgba(37,99,235,.4);}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover{background:#15803d;}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#b91c1c;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-xs{padding:2px 7px;font-size:10px;border-radius:4px;}
.no-spinner::-webkit-outer-spin-button,.no-spinner::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.no-spinner{-moz-appearance:textfield;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.badge-blue{background:var(--accent-soft);color:var(--accent);}
.badge-green{background:var(--green-soft);color:var(--green);}
.badge-amber{background:var(--amber-soft);color:var(--amber);}
.badge-red{background:var(--red-soft);color:var(--red);}
.badge-purple{background:var(--purple-soft);color:var(--purple);}

/* Alerts */
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:8px;border-left:3px solid;}
.alert-error{background:var(--red-soft);color:var(--red);border-color:var(--red);}
.alert-warn{background:var(--amber-soft);color:var(--amber);border-color:var(--amber);}
.alert-info{background:var(--surface2);color:var(--text2);border-color:var(--border2);}
.alert-success{background:var(--green-soft);color:var(--green);border-color:var(--green);}

/* Flex utils */
.flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.gap-4{gap:4px;}.gap-8{gap:8px;}.gap-16{gap:16px;}
.mb-4{margin-bottom:4px;}.mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}.mb-16{margin-bottom:16px;}.mb-20{margin-bottom:20px;}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}
.w-full{width:100%;}

/* Color dot */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}

/* Alloc cell popup */
.cell-popup{position:absolute;top:calc(100% + 4px);left:0;z-index:200;
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);
  box-shadow:var(--shadow-lg);padding:4px;min-width:160px;max-height:220px;overflow-y:auto;}
.cell-popup-item{padding:7px 10px;font-size:12px;cursor:pointer;border-radius:6px;color:var(--text2);font-family:var(--font);transition:background .1s;}
.cell-popup-item:hover{background:var(--surface2);}
.cell-popup-item.active{font-weight:600;}
.cell-popup-none{color:var(--text3);font-style:italic;}

/* Progress bar */
.prog-bar{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .3s;}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

/* Section divider */
.section-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;pointer-events:none;}
.toast-msg{background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;margin-top:8px;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
.toast-msg.show{opacity:1;transform:translateY(0);}

/* Scrollable constraint */
.scroll-table{overflow:auto;max-height:75vh;}.scroll-table.fs-mode{max-height:calc(100vh - 90px);}
@media print{.topbar,.nav,.btn,button{display:none!important;}.card{box-shadow:none!important;}body{background:#fff!important;}}

/* Mobile responsive */
@media(max-width:768px){
  .topbar{padding:0 12px;height:46px;gap:6px;}
  .logo-text{font-size:13px;margin-left:6px;}
  .topbar-meta{display:none;}
  .nav{padding:0 8px;gap:0;}
  .nav-btn{padding:8px 10px;font-size:11px;gap:4px;}
  .nav-icon{font-size:11px;}
  .main{padding:12px;}
  .stats-row{gap:8px;}
  .stat-card{padding:10px 12px;min-width:90px;}
  .stat-val{font-size:18px;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .table-wrap,.scroll-table{font-size:11px;}
  th,td{padding:6px 7px;font-size:11px;}
  .flex{flex-wrap:wrap;}
  .card-pad{padding:12px;}
  input,select,textarea{font-size:13px;} /* prevent iOS zoom */
}
@media(max-width:480px){
  .topbar{height:42px;}
  .topbar-right .badge{display:none;}
  .topbar-right .term-badge{display:none;}
  .main{padding:8px;}
  .page-header h2{font-size:16px;}
}

/* Sync pulse */
.sync-pulse{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.last-sync{font-size:10px;color:var(--text3);margin-left:4px;}
</style>

<script>
// Detect network-drive / UNC path — fires before anything else renders
(function(){
  var loc = window.location.href;
  var isUNC = loc.startsWith('file:////') || loc.indexOf('file://__') >= 0 || loc.indexOf('file://\\') >= 0;
  // Also catch file:// paths that go via \server\ (shown as file:////server or file://__server)
  var isNetworkPath = /^file:\/\/\/\/[^/]/.test(loc) || /^file:\/\/__/.test(loc);
  if (isUNC || isNetworkPath) {
    document.addEventListener('DOMContentLoaded', function(){
      var b = document.createElement('div');
      b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#dc2626;color:#fff;padding:14px 24px;font-family:sans-serif;font-size:14px;line-height:1.5;box-shadow:0 2px 8px rgba(0,0,0,.3)';
      b.innerHTML = '<strong>⚠️ LEX cannot run from a network drive.</strong><br>' +
        'This file was opened from a network or shared folder. Browsers block JavaScript on network paths.<br>' +
        '<strong>Fix:</strong> Right-click the file → <em>Save As</em> → save to your <strong>Desktop or C:\\Users\\YourName\\Downloads</strong> (local drive, not a mapped drive) → open from there.<br>' +
        '<small style="opacity:.8">Path detected: ' + loc.slice(0,80) + '</small>';
      document.body.prepend(b);
    });
  }
})();
</script>

// ═══════════════════════════════════════════════
// CONSTANTS & UTILITIES
// ═══════════════════════════════════════════════
const COLORS=["#2563eb","#d97706","#16a34a","#dc2626","#7c3aed","#0891b2","#db2777","#65a30d","#ca8a04","#ea580c"];
function gc(n){return COLORS[Math.abs([...String(n||"")].reduce((a,c)=>a+c.charCodeAt(0),0))%COLORS.length];}

// Robust pupil matching: normalise emails for comparison
function normEmail(e){return(e||"").trim().toLowerCase().replace(/\s+/g,"");}
// Normalise house names to single-letter initial for consistent display
function normaliseHouse(h2){
  if(!h2)return"";const s=h2.trim();if(!s)return"";
  // If already a single letter, return as uppercase
  if(s.length===1)return s.toUpperCase();
  // Map known house names / abbreviations to standard initial
  const houseMap={
    "king's":"K","kings":"K","king":"K",
    "devine":"D","dev":"D","de":"D",
    "wolverton":"W","wolv":"W",
    "cross":"C",
    "alderholt":"A","alder":"A",
    "sandles":"S","sandl":"S",
    "other":"O"
  };
  const k=s.toLowerCase().replace(/[''']/g,"'");
  for(const[pat,init]of Object.entries(houseMap)){if(k===pat||k.startsWith(pat+" ")||k===pat.replace("'",""))return init;}
  // Fall back to first letter uppercase
  return s[0].toUpperCase();
}
function findPupilByEmail(email){
  const ne=normEmail(email);
  return pupils.find(p=>normEmail(p.email)===ne);
}
// Fuzzy activity name matching: find closest match in acts
function findActByName(name){
  if(!name)return null;
  const n=name.trim();
  // Exact match first
  let found=acts.find(a=>a.n===n);if(found)return found;
  // Case-insensitive
  const nl=n.toLowerCase();
  found=acts.find(a=>a.n.toLowerCase()===nl);if(found)return found;
  // Trimmed/normalised (remove extra spaces, hyphens)
  const norm=s=>s.toLowerCase().replace(/[\s\-_]+/g,"");
  found=acts.find(a=>norm(a.n)===norm(n));if(found)return found;
  // Substring match (name contains or is contained by)
  found=acts.find(a=>norm(a.n).includes(norm(n))||norm(n).includes(norm(a.n)));
  return found||null;
}

function toast(msg,type="ok"){
  const t=document.getElementById("toast");
  const d=document.createElement("div");
  d.className="toast-msg";
  d.style.background=type==="ok"?"#16a34a":type==="err"?"#dc2626":"#1a1916";
  d.textContent=msg;
  t.appendChild(d);
  requestAnimationFrame(()=>{d.classList.add("show");});
  setTimeout(()=>{d.classList.remove("show");setTimeout(()=>d.remove(),300);},2800);
}

function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(el.style,v);}
    else if(k.startsWith("on")&&k.length>2){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="className"){el.className=v;}
    else if(k==="value"&&(el.tagName==="INPUT"||el.tagName==="TEXTAREA")){el.value=v;}
    else if(k==="checked"){el.checked=v;}
    else if(k==="selected"){el.selected=v;}
    else if(k==="disabled"){if(v)el.setAttribute("disabled","");}
    else{el.setAttribute(k,v);}
  });
  ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(String(c)));else if(c instanceof Node)el.appendChild(c);});
  return el;
}

let SUPA_URL=localStorage.getItem("lex11-supa-url")||"";
let SUPA_KEY=localStorage.getItem("lex11-supa-key")||"";
let supaClient=null,supaConnected=false,syncStatus="local";

function initSupabase(){
  if(!SUPA_URL||!SUPA_KEY){supaClient=null;supaConnected=false;syncStatus="local";return;}
  try{supaClient=supabase.createClient(SUPA_URL,SUPA_KEY);supaConnected=true;syncStatus="online";}
  catch(e){supaClient=null;supaConnected=false;syncStatus="error";console.error(e);}
}
async function supaGet(key){
  if(!supaClient)return null;
  try{const{data,error}=await supaClient.from("lex_data").select("value").eq("key",key).single();
    if(error&&error.code!=="PGRST116")throw error;
    if(!data)return null;
    const v=data.value;
    // value may be already-parsed (jsonb) or a string — handle both
    if(typeof v==="string"){try{return JSON.parse(v);}catch{return v;}}
    return v;}
  catch(e){console.error("supaGet",key,e);return null;}
}
async function supaSet(key,value){
  if(!supaClient)return false;
  try{
    // Always store as JSON string to avoid jsonb type negotiation issues
    const{error}=await supaClient.from("lex_data").upsert({key,value:JSON.stringify(value),updated_at:new Date().toISOString()});
    if(error)throw error;return true;}
  catch(e){console.error("supaSet",key,e);return false;}
}
async function loadFromSupabase(){
  const keys=["acts","staff","sa","pupils","dates","priorytd","allocoverrides","allocdateoverrides","allochistory","formdata","allocres","venuelist","consentmap"];
  const res=await Promise.all(keys.map(k=>supaGet("lex11-"+k)));
  if(res[0])acts=res[0];if(res[1])staff=res[1];if(res[2])sa=res[2];
  if(res[3])pupils=res[3];if(res[4])dates=res[4];if(res[5])priorYTD=res[5];
  if(res[6])allocOverrides=res[6];if(res[7])allocDateOverrides=res[7];if(res[8])allocHistory=res[8];
  if(res[9])formData=res[9];if(res[10])allocRes=res[10];if(res[11])venues=res[11];
  syncStatus="online";lastSyncTime=new Date();
}

// Staff allocation tracker with activity weightings
// Weighting: 2=lead whole year group, 1=lead module, 0.5=supporting/register only
// Returns {code: {s1raw, s2raw, tdRaw, s1max, s2max, tdMax, s1frac, s2frac, tdfrac, priorYTD, grandTotal}}
function getStaffAllocStats(){
  const s1Di=dates.map((_,i)=>i).filter(i=>dates[i].half==="S1");
  const s2Di=dates.map((_,i)=>i).filter(i=>dates[i].half==="S2");
  // max possible weighted points per half (each date counts as 1 * max weight)
  const maxWt=Math.max(...acts.map(a=>a.wt||1),1);
  const s1max=s1Di.length*maxWt;
  const s2max=s2Di.length*maxWt;
  const tdMax=dates.length*maxWt;
  const NON_COUNTED_DESIGS=new Set(STAFF_DESIGNATIONS.filter(d=>!d.counted).map(d=>d.n));
  const stats={};
  staff.forEach(s=>{
    function sumWt(diArr){
      return diArr.reduce((acc,di)=>{
        const actName=sa[di+"|"+s.c];
        if(!actName)return acc;
        if(NON_COUNTED_DESIGS.has(actName))return acc; // "Not In", "Not Available" don't count
        const act=acts.find(a=>a.n===actName);
        return acc+(act?((act.wt)||1):1);
      },0);
    }
    function countDates(diArr){
      return diArr.filter(di=>{const an=sa[di+"|"+s.c];return an&&!NON_COUNTED_DESIGS.has(an);}).length;
    }
    const s1raw=sumWt(s1Di);
    const s2raw=sumWt(s2Di);
    const tdRaw=sumWt(dates.map((_,i)=>i));
    const prior=priorYTD[s.c]||0;
    stats[s.c]={
      s1raw,s2raw,tdRaw,
      s1frac:s1max>0?s1raw/s1max:0,
      s2frac:s2max>0?s2raw/s2max:0,
      tdfrac:tdMax>0?tdRaw/tdMax:0,
      s1max,s2max,tdMax,
      priorYTD:prior,
      grandTotal:tdRaw+prior,
      // Simple date counts for display (excluding non-counted designations)
      s1n:countDates(s1Di),
      s2n:countDates(s2Di),
      alln:countDates(dates.map((_,i)=>i)),
    };
  });
  return stats;
}

const STAFF_TAIL_ORDER=["Sports Centre","Druce","Kalim","Baker","Shale","Gerken","Hugo Shale"];
function staffSortKey(s){
  const tailIdx=STAFF_TAIL_ORDER.findIndex(t=>(s.n||"").toLowerCase().includes(t.toLowerCase()));
  if(tailIdx>=0)return "ZZ"+String(tailIdx).padStart(2,"0")+(s.n||"");
  // External staff (r==="ext") go after teaching but before tail
  if((s.r||"").toLowerCase()==="ext")return "ZA"+(s.n||"");
  return "AA"+(s.n||"");

// Returns acts sorted alpha, then designations at bottom separated by divider
// For select elements: returns array of {value, label, isDivider, isDesig}
function buildActOptions(actList, includeDesignations){
  const sorted=[...actList].sort((a,b)=>(a||"").localeCompare(b||""));
  const desigs=STAFF_DESIGNATIONS.map(d=>d.n);
  const regular=sorted.filter(n=>!desigs.includes(n));
  const inDesig=sorted.filter(n=>desigs.includes(n));
  const result=regular.map(n=>({value:n,label:n}));
  if(includeDesignations!==false&&STAFF_DESIGNATIONS.length>0){
    result.push({isDivider:true,label:"────────────────"});
    STAFF_DESIGNATIONS.forEach(d=>result.push({value:d.n,label:d.n,isDesig:true}));
  }
  return result;
}
function appendActOptions(sel, actList, currentVal, includeDesignations){
  buildActOptions(actList, includeDesignations).forEach(opt=>{
    if(opt.isDivider){
      const o=document.createElement("option");o.disabled=true;o.textContent=opt.label;
      o.style.color="var(--text3)";o.style.fontSize="9px";sel.appendChild(o);
    } else {
      const o=document.createElement("option");o.value=opt.value;o.textContent=opt.label;
      if(opt.isDesig)o.style.color="#111";
      if(currentVal&&opt.value===currentVal)o.selected=true;
      sel.appendChild(o);
    }
  });
}

function ygSort(arr){
  const order=["Year 9","Y9","9","Year 10","Y10","10","Year 11","Y11","11","Year 12","Y12","12","Year 13","Y13","13"];
  return arr.slice().sort((a,b)=>{const ia=order.findIndex(o=>a===o||a.includes(o)),ib=order.findIndex(o=>b===o||b.includes(o));if(ia>=0&&ib>=0)return ia-ib;return a.localeCompare(b);});
}

function runAllocEngineV12(){
  const log=[];if(!formData.length){allocLog=["ERROR: No form data loaded. Go to Paste Responses first."];return;}
  const allRes=[];
  waitingList={};

  // Step 0: Build fuzzy name map for all form choices
  const nameFixLog=[];
  function resolveActName(rawName,halfLabel){
    if(!rawName)return null;
    const exact=acts.find(a=>a.n===rawName);
    if(exact)return exact.n;
    const fuzzy=findActByName(rawName);
    if(fuzzy){
      nameFixLog.push("  AUTO-MATCHED: \""+rawName+"\" → \""+fuzzy.n+"\" in "+halfLabel);
      return fuzzy.n;
    }
    return null; // truly not found
  }

  ["S1","S2"].forEach(half=>{
    const halfLabel=half==="S1"?"Summer 1":"Summer 2";
    log.push("═══════════════════════════════════════════");
    log.push("ALLOCATING: "+halfLabel+" ("+formData.length+" pupils)");
    log.push("═══════════════════════════════════════════");

    const halfDi=dates.map((_,i)=>i).filter(i=>dates[i].half===half);
    const hActs=acts.filter(a=>a.di.some(d=>halfDi.includes(d))&&a.cap>0);
    const capU={},capM={};hActs.forEach(a=>{capU[a.n]=0;capM[a.n]=a.cap;});
    const vn=new Set(hActs.map(a=>a.n));

    acts.filter(a=>a.di.some(d=>halfDi.includes(d))&&!a.cap).forEach(a=>log.push("WARNING: "+a.n+" skipped (capacity TBC)"));

    // Step 1: Apply manual overrides (including "Out of school")
    const overrides=allocOverrides[half.toLowerCase()]||{};
    const overriddenEmails=new Set();
    Object.entries(overrides).forEach(([email,activity])=>{
      if(activity){
        const origFd=formData.find(f=>normEmail(f.email)===normEmail(email));
        allRes.push({email:origFd?origFd.email:email,alloc:activity,lvl:0,st:"OVERRIDE",half,isOverride:true,
          s1c1:"",s1c2:"",s1c3:"",s2c1:"",s2c2:"",s2c3:"",...(origFd||{})});
        if(capU[activity]!==undefined)capU[activity]=(capU[activity]||0)+1;
        overriddenEmails.add(normEmail(email));
        log.push("  OVERRIDE: "+email+" → "+activity);
      }
    });

    // Log any fuzzy matches found
    if(nameFixLog.length>0){nameFixLog.forEach(l=>log.push(l));nameFixLog.length=0;}

    // Step 2: Score and sort remaining pupils
    const remaining=formData.filter(p=>!overriddenEmails.has(normEmail(p.email))).map(p=>{
      const tsScore=new Date(p.timestamp||0).getTime()||0;
      let disappointmentCount=0;
      allocHistory.forEach(h2=>{if(normEmail(h2.email)===normEmail(p.email)&&h2.choiceIndex>0)disappointmentCount++;});
      const otherHalfRes=allRes.find(r=>normEmail(r.email)===normEmail(p.email)&&r.half!==half);
      if(otherHalfRes&&otherHalfRes.lvl>1)disappointmentCount++;
      const actHistoryCount={};
      allocHistory.forEach(h2=>{if(normEmail(h2.email)===normEmail(p.email)){actHistoryCount[h2.activity]=(actHistoryCount[h2.activity]||0)+1;}});
      if(otherHalfRes&&otherHalfRes.alloc){actHistoryCount[otherHalfRes.alloc]=(actHistoryCount[otherHalfRes.alloc]||0)+1;}
      return{...p,tsScore,disappointmentCount,actHistoryCount};
    });

    remaining.sort((a,b)=>{
      if(b.disappointmentCount!==a.disappointmentCount)return b.disappointmentCount-a.disappointmentCount;
      return a.tsScore-b.tsScore;
    });

    // Step 3: Allocate with fuzzy matching
    remaining.forEach(p=>{
      const rawC1=half==="S1"?(p.s1c1||p.c1||""):(p.s2c1||p.c1||"");
      const rawC2=half==="S1"?(p.s1c2||p.c2||""):(p.s2c2||p.c2||"");
      const rawC3=half==="S1"?(p.s1c3||p.c3||""):(p.s2c3||p.c3||"");
      const ch=[rawC1,rawC2,rawC3].map(c=>{
        if(!c)return null;
        const resolved=resolveActName(c,halfLabel);
        if(!resolved&&c)log.push("  "+p.email+": \""+c+"\" NOT FOUND in "+halfLabel+" (not in activity list)");
        return resolved;
      }).filter(Boolean);
      let alloc=null,lvl=null;

      for(let i=0;i<ch.length;i++){
        if(!vn.has(ch[i]))continue; // not running this half
        const cap=capM[ch[i]],used=capU[ch[i]]||0;
        if(used>=cap){
          log.push("  "+p.email+": "+ch[i]+" FULL ("+used+"/"+cap+")");
          // Add to waiting list
          if(!waitingList[ch[i]])waitingList[ch[i]]=[];
          waitingList[ch[i]].push({email:p.email,choiceIndex:i,half});
          continue;
        }
        if(i===0&&(p.actHistoryCount[ch[i]]||0)>0){
          const demand=remaining.filter(r=>{const rc=half==="S1"?(r.s1c1||r.c1):(r.s2c1||r.c1);return resolveActName(rc,halfLabel)===ch[i];}).length;
          if(demand>cap){
            log.push("  "+p.email+": REPEAT PENALTY on "+ch[i]+" (done before, oversubscribed "+demand+"/"+cap+")");
            if(!waitingList[ch[i]])waitingList[ch[i]]=[];
            waitingList[ch[i]].push({email:p.email,choiceIndex:i,half});
            continue;
          }
        }
        alloc=ch[i];lvl=i+1;capU[ch[i]]=used+1;break;
      }
      if(alloc){
        log.push("  "+p.email+" → "+alloc+" (choice "+lvl+(p.disappointmentCount>0?" · fairness boost":"")+")");
        allRes.push({...p,alloc,lvl,st:lvl===1?"1ST":lvl===2?"2ND":"3RD",half,isOverride:false});
      }else{
        const choicesStr=ch.length>0?ch.join(", "):"no valid choices";
        log.push("  "+p.email+": UNMATCHED (wanted: "+choicesStr+")");
        allRes.push({...p,alloc:null,lvl:null,st:"UNMATCHED",half,isOverride:false});
      }
    });

    log.push("");
    const s1c=allRes.filter(r=>r.half===half&&r.lvl===1).length;
    const s2c=allRes.filter(r=>r.half===half&&r.lvl===2).length;
    const s3c=allRes.filter(r=>r.half===half&&r.lvl===3).length;
    const um=allRes.filter(r=>r.half===half&&!r.alloc).length;
    const ov=allRes.filter(r=>r.half===half&&r.isOverride).length;
    log.push("SUMMARY ("+halfLabel+"): "+s1c+" 1st | "+s2c+" 2nd | "+s3c+" 3rd | "+ov+" overrides | "+um+" unmatched");
    log.push("CAPACITY: "+Object.entries(capU).filter(([,v])=>v>0).map(([k,v])=>k+": "+v+"/"+capM[k]).join(" | "));
    // Demand report
    const demand={};formData.forEach(p=>{
      const c=half==="S1"?(p.s1c1||p.c1||""):(p.s2c1||p.c1||"");
      const resolved=resolveActName(c,halfLabel);if(resolved){demand[resolved]=(demand[resolved]||0)+1;}
    });
    const hotActs=Object.entries(demand).filter(([k,v])=>v>(capM[k]||0)).sort((a,b)=>b[1]-a[1]);
    if(hotActs.length>0){
      log.push("OVERSUBSCRIBED: "+hotActs.map(([k,v])=>k+" ("+v+" wanted, "+capM[k]+" places)").join(" | "));
    }
    log.push("");
  });

  allocRes=allRes;
  allocLog=log;
  saveAll();
}

function renderRegisters(el){
  el.appendChild(h("div",{className:"page-header"},h("h2",null,"Registers"),h("p",null,"Select a date and activity to view the pupil register. Pupils are shown from their half-term allocation.")));

        h("span",{style:{fontSize:"11px",color:"var(--text3)"}},matched.length+" pupils")
      )
    ));

      navigator.clipboard.writeText(txt).then(()=>toast("Register copied"));

      actNames.forEach(an=>{

        actMatched.sort((a,b)=>(a.surname||"").localeCompare(b.surname||""));
        actMatched.forEach(p=>allRows.push([p.surname||"",p.forename||"",p.yg||"",p.house||"",an,p.st||""]));

      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download="Register_"+(dates[regDate]?.label||"date").replace(/\s+/g,"_")+".csv";
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      toast("Register CSV downloaded");
    }},"⬇ Download Date Register CSV"));
    card.appendChild(hdr);
    if(matched.length===0){card.appendChild(h("div",{style:{padding:"16px",color:"var(--text3)",fontSize:"12px"}},"No pupils allocated to this activity."));}
    else{
      const rt=h("table",null);

      const rb=h("tbody",null);
      matched.forEach((p,i)=>{rb.appendChild(h("tr",null,
        h("td",{style:{color:"var(--text3)"}},String(i+1)),

        h("td",null,h("span",{className:"badge "+(p.st==="1ST"?"badge-green":"badge-amber")},p.st)),
        h("td",null,h("input",{type:"checkbox",style:{width:"16px",height:"16px"}}))
      ));});
      rt.appendChild(rb);card.appendChild(rt);
    }
    regDiv.appendChild(card);
  }
}

function renderPupils(el){
  el.appendChild(h("div",{className:"page-header"},h("h2",null,"Pupils ("+pupils.length+")"),h("p",null,"Import pupil data. Columns: Tutor, Forename, Preferred Forename, Surname, Year Group, House, Status, Email")));

  const ygCounts={};pupils.forEach(p=>{ygCounts[p.yg]=(ygCounts[p.yg]||0)+1;});

  // Stats
  if(pupils.length>0){
    const statsRow=h("div",{className:"stats-row mb-16"});
    statsRow.appendChild(h("div",{className:"stat-card"},h("div",{className:"stat-val"},pupils.length),h("div",{className:"stat-label"},"Total Pupils")));
    Object.entries(ygCounts).sort((a,b)=>{const o=["Year 9","Year 10","Year 11","Year 12","Year 13"];const ia=o.findIndex(x=>a[0].includes(x.replace("Year ","")));const ib=o.findIndex(x=>b[0].includes(x.replace("Year ","")));if(ia>=0&&ib>=0)return ia-ib;return a[0].localeCompare(b[0]);}).forEach(([yg,c])=>{
      statsRow.appendChild(h("div",{className:"stat-card"},h("div",{className:"stat-val"},c),h("div",{className:"stat-label"},yg||"Unknown")));
    });
    el.appendChild(statsRow);
  }

  // Import card
  const importCard=h("div",{className:"card card-pad mb-16"});
  importCard.appendChild(h("label",{className:"field-label"},"Paste pupil data (tab or comma separated, first row = header)"));
  importCard.appendChild(h("p",{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"8px"}},"Expected columns: Tutor · Forename · Preferred Forename · Surname · Year Group · House · Status · Email"));
  const ta=h("textarea",{rows:6,placeholder:"Tutor\tForename\tPreferred Forename\tSurname\tYear Group\tHouse\tStatus\tEmail\nSMITH\tJames\tJamie\tBrown\tYear 10\tSomerset\tBoarding\tjbrown@clayesmore.com",style:{marginBottom:"10px"}});
  importCard.appendChild(ta);

  const btnRow=h("div",{className:"flex"});
  btnRow.appendChild(h("button",{className:"btn btn-primary",onClick:()=>{
    const raw=ta.value.trim();
    if(!raw){toast("Nothing to import","err");return;}
    const lines=raw.split("\n").filter(l=>l.trim());
    if(lines.length<2){toast("Need at least a header row and one data row","err");return;}
    const sep=lines[0].includes("\t")?"\t":",";
    // Detect column order from header
    const header=lines[0].split(sep).map(x=>x.replace(/^"|"$/g,"").trim().toLowerCase());
    const colMap={
      tutor:["tutor","form","form tutor","tutor group","reg","registration","pastoral tutor","form teacher"],
      forename:["forename","first name","firstname","given name","christian name","preferred forename","first"],
      pref:["preferred forename","preferred name","preferred","pref","known as","goes by","nickname","preferred first name"],
      surname:["surname","last name","lastname","family name","last"],
      yg:["year group","year","form year","yeargroup","nc year","yr group","yr grp","year grp","reg group","registration group","form group","academic year","year of entry","yg","yr","y group"],
      house:["house","boarding house","house group","pastoral house"],
      status:["status","boarding status","day/boarding","board/day","type","pupil type"],
      email:["email","email address","e-mail","e mail","school email","pupil email"]
    };
    function findCol(keys){
      for(const k of keys){const idx=header.indexOf(k);if(idx>=0)return idx;}
      return -1;
    }
    const ci={
      tutor:findCol(colMap.tutor),
      forename:findCol(colMap.forename),
      pref:findCol(colMap.pref),
      surname:findCol(colMap.surname),
      yg:findCol(colMap.yg),
      house:findCol(colMap.house),
      status:findCol(colMap.status),
      email:findCol(colMap.email)
    };

    // Fallback: assume positional order if no headers match
    // Order: Tutor(0) Forename(1) Preferred(2) Surname(3) YG(4) House(5) Status(6) Email(7)
    if(ci.email<0&&ci.surname<0){
      ci.tutor=0;ci.forename=1;ci.pref=2;ci.surname=3;ci.yg=4;ci.house=5;ci.status=6;ci.email=7;
    }

    const imported=[];
    lines.slice(1).forEach(l=>{
      const c=l.split(sep).map(x=>x.replace(/^"|"$/g,"").trim());
      if(c.length<2)return;
      const get=(key)=>ci[key]>=0&&ci[key]<c.length?c[ci[key]]:"";
      const email=get("email");
      // Accept rows with or without email (email can be in any column)
      imported.push({
        tutor:get("tutor"),
        forename:get("forename"),
        pref:get("pref"),
        surname:get("surname"),
        yg:get("yg"),
        house:normaliseHouse(get("house")),
        status:get("status"),
        email:email
      });
    });
    if(imported.length===0){toast("No valid rows found — check format","err");return;}
    const importEmails=new Set(imported.map(p=>normEmail(p.email)).filter(Boolean));
    const existingPupilMap=new Map(pupils.map(p=>[normEmail(p.email),p]));
    // Update existing & add new
    let added=0,updated=0;
    imported.forEach(p=>{
      const ne=normEmail(p.email);
      if(ne&&existingPupilMap.has(ne)){
        const existing=existingPupilMap.get(ne);
        const medBak=existing.med,dietBak=existing.diet,consentBak=existing.consent||{};
        Object.assign(existing,p);
        if(!p.med)existing.med=medBak;
        if(!p.diet)existing.diet=dietBak;
        existing.consent=consentBak;
        updated++;
      }else{
        existingPupilMap.set(ne||("nomail-"+Date.now()+Math.random()),p);

function generateRASheet(actName,dateIdx){
  const out=document.getElementById("ra-output");if(!out)return;out.innerHTML="";
  const act=acts.find(a=>a.n===actName);if(!act)return;
  // Get allocated pupils
  if(!allocRes){out.appendChild(h("div",{className:"alert alert-warn"},"Run allocation first."));return;}
  // Determine which half-terms this activity runs in
  let relevantHalves=[];
  if(dateIdx!==""){
    relevantHalves=[dates[Number(dateIdx)]?.half];
  }else{
    relevantHalves=[...new Set(act.di.map(i=>dates[i]?.half).filter(Boolean))];
  }
  const matchedEmails=new Set();
  allocRes.forEach(r=>{if(r.alloc===actName&&relevantHalves.includes(r.half))matchedEmails.add(r.email);});
  const pupilList=[...matchedEmails].map(email=>{
    const p=findPupilByEmail(email);
    return{email,forename:p?(p.pref||p.forename||""):"",surname:p?(p.surname||""):"",yg:p?(p.yg||""):"",house:p?(p.house||""):"",med:p?(p.med||""):"",diet:p?(p.diet||""):"",status:p?(p.status||""):""};

  const leader=act.lead?staff.find(s=>s.c===act.lead):null;
  // Header info

  info.appendChild(h("div",{style:{fontWeight:700,fontSize:"15px",color:gc(actName),marginBottom:"8px"}},actName));
  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"auto 1fr",gap:"4px 12px",fontSize:"12px"}});
  [["Venue:",act.v||"TBC"],["Group Leader:",leader?(leader.n+" ("+leader.c+")"):"TBC"],["Dates:",dateIdx!==""?dates[Number(dateIdx)]?.label:act.di.map(i=>dates[i]?.label).join(", ")],
   ["Session:",act.sess||"A+B"],["Transport:",act.mb?"Minibus":"N/A"],["RA Status:",act.ra||"—"],["Provider RA:",act.provRA||"N/A"]
  ].forEach(([l,v])=>{grid.appendChild(h("div",{style:{color:"var(--text3)",fontWeight:500}},l));grid.appendChild(h("div",null,v));});
  info.appendChild(grid);out.appendChild(info);

  // Pupil table

  hdr.appendChild(h("span",{className:"card-title"},pupilList.length+" pupils"));
  hdr.appendChild(h("button",{className:"btn btn-ghost btn-sm",onClick:()=>{
    const header="Surname\tForename\tYear\tHouse\tDay/Boarder\tMedical\tDietary";
    const rows=pupilList.map(p=>[p.surname,p.forename,p.yg,p.house,p.status,p.med,p.diet].join("\t"));
    navigator.clipboard.writeText(actName+" — Pupil List for RA\n"+header+"\n"+rows.join("\n")).then(()=>toast("Pupil list copied"));
  }},"📋 Copy for RA"));
  card.appendChild(hdr);
  const tw=h("div",{style:{overflow:"auto"}});
  const t=h("table",null);
  t.appendChild(h("thead",null,h("tr",null,...["Surname","Forename","Year","House","Day/Board","Medical","Dietary"].map(x=>h("th",null,x)))));
  const tb=h("tbody",null);
  pupilList.forEach(p=>{
    tb.appendChild(h("tr",null,
      h("td",{style:{fontWeight:600}},p.surname),h("td",null,p.forename),h("td",null,p.yg),h("td",null,p.house),h("td",null,p.status),
      h("td",{style:{fontSize:"11px",color:p.med?"var(--red)":"var(--text3)",maxWidth:"200px",whiteSpace:"normal"}},p.med||"—"),
      h("td",{style:{fontSize:"11px",color:p.diet?"var(--amber)":"var(--text3)",maxWidth:"200px",whiteSpace:"normal"}},p.diet||"—")
    ));
  });

  // Build set of emails that have a manual override (they are "allocated" even without a form)
  const overriddenEmails=new Set([
    ...Object.values(allocOverrides.s1||{}).length>0?Object.keys(allocOverrides.s1||{}).map(normEmail):[],
    ...Object.values(allocOverrides.s2||{}).length>0?Object.keys(allocOverrides.s2||{}).map(normEmail):[],
  ].filter(Boolean));
  // "Missing" = no form AND no manual override
  const missingPupils=pupils.filter(p=>p.email&&!formEmails.has(normEmail(p.email))&&!overriddenEmails.has(normEmail(p.email)));
  if(missingPupils.length===0&&formData.length>0){
    el.appendChild(h("div",{className:"alert alert-success mb-12"},"All pupils have submitted!"));
  }else if(formData.length===0){
    el.appendChild(h("div",{className:"alert alert-warn mb-12"},"No form data loaded yet — paste responses in the Allocate tab first."));
  }else{
    // Group by year
    const missByYg={};
    missingPupils.forEach(p=>{const yg=p.yg||"Unknown";if(!missByYg[yg])missByYg[yg]=[];missByYg[yg].push(p);});
    ygSort(Object.keys(missByYg)).forEach(yg=>{
      const ygPupils=missByYg[yg].sort((a,b)=>(a.surname||"").localeCompare(b.surname||""));
      const card=h("div",{className:"card card-pad mb-12"});
      const btnRow=h("div",{className:"flex mb-8",style:{gap:"6px",flexWrap:"wrap",alignItems:"center"}});
      btnRow.appendChild(h("div",{style:{fontWeight:600,fontSize:"13px",flex:1}},yg+" — "+ygPupils.length+" missing"));
      btnRow.appendChild(h("button",{className:"btn btn-ghost btn-sm",onClick:()=>{
        const emails=ygPupils.map(p=>p.email).filter(Boolean).join(", ");
        const formUrl=localStorage.getItem(formUrlKey)||"";
        const msg="Dear pupil,\n\nYou have not yet submitted your LEX activity choices for Summer Term. Please complete the form as soon as possible."+
          (formUrl?"\n\nForm link: "+formUrl:"")+"\n\nThank you.";
        navigator.clipboard.writeText(emails+"\n\n"+msg).then(()=>toast(ygPupils.length+" emails + message copied"));
      }},"📋 Copy Pupil Emails + Message"));
      // Tutor email button
      const tutorEmails=[...new Set(ygPupils.map(p=>p.tutor).filter(Boolean))].map(tc=>{const ts=staff.find(s=>s.c===tc);return ts?ts.n:tc;});
      // Find tutor staff emails if available — use tutor code to look up staff email
      const tutorCodes=[...new Set(ygPupils.map(p=>p.tutor).filter(Boolean))];
      if(tutorCodes.length>0){
        btnRow.appendChild(h("button",{className:"btn btn-ghost btn-sm",onClick:()=>{
          const tEmails=tutorCodes.map(tc=>{const ts=staff.find(s=>s.c===tc);return ts&&ts.email?ts.email:tc;}).join(", ");
          const names=ygPupils.map(p=>((p.pref||p.forename||"")+" "+(p.surname||"")).trim()+" ("+p.yg+")").join(", ");
          navigator.clipboard.writeText(tEmails+"\n\nFYI — the following pupils have not yet submitted a form: "+names).then(()=>toast("Tutor codes/emails copied"));
        }},"📋 Copy Tutor Refs"));
      }
      card.appendChild(btnRow);
      // List pupils with tutor
      const pupilList=h("div",{style:{fontSize:"11px",color:"var(--text2)",lineHeight:"1.8"}});
      ygPupils.forEach(p=>{
        const name=((p.pref||p.forename||"")+" "+(p.surname||"")).trim();
        const tutorStr=p.tutor?" (Tutor: "+p.tutor+")":"";
        const span=h("span",{style:{marginRight:"12px",display:"inline-block"}},name+tutorStr);
        pupilList.appendChild(span);
      });
      card.appendChild(pupilList);
      el.appendChild(card);
    });
    // Copy all missing as reminder
    el.appendChild(h("button",{className:"btn btn-primary mb-16",onClick:()=>{
      const allEmails=missingPupils.map(p=>p.email).filter(Boolean).join(", ");
      const formUrl=localStorage.getItem(formUrlKey)||"";
      const msg="Dear pupil,\n\nYou have not yet submitted your LEX activity choices for Summer Term. Please complete the form as soon as possible so we can allocate you to your preferred activities."+
        (formUrl?"\n\nForm link: "+formUrl:"")+"\n\nThank you.";
      navigator.clipboard.writeText(allEmails+"\n\n"+msg).then(()=>toast("All "+missingPupils.length+" emails + message copied"));
    }},"📋 Copy All Missing Emails + Reminder Message"));
  }

  // Pupil timetable for Google Classroom — includes ALL pupils
  el.appendChild(h("hr",{className:"section-divider"}));
  el.appendChild(h("div",{style:{fontWeight:700,fontSize:"14px",marginBottom:"4px"}},"Pupil Allocation Timetables"));
  el.appendChild(h("p",{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"12px"}},"All pupils shown — allocated activity or 'Awaiting submission' if no form received. Copy and paste into Google Classroom."));

  // Build rows from ALL pupils in directory
  // Build per-date allocation for each pupil
  function getActForPupilOnDate(email,di){
    const ne=normEmail(email);
    // Check per-date override first
    const dateKey=di+"|"+ne;
    if(allocDateOverrides[dateKey])return allocDateOverrides[dateKey];
    // Then half-term allocation
    const half=dates[di]?.half;
    if(!half)return"—";
    const ht=half.toLowerCase();
    // Check half-term override (normalise key too)
    const htOverrides=allocOverrides[ht]||{};
    const ovKey=Object.keys(htOverrides).find(k=>normEmail(k)===ne);
    if(ovKey)return htOverrides[ovKey];
    // Check allocation result
    const res=allocRes?allocRes.find(r=>normEmail(r.email)===ne&&r.half===half):null;
    if(res&&res.alloc)return res.alloc;
    if(formEmails.has(ne))return res?"Unmatched":"—";
    return"";
  }

  const allRows=pupils.map(p=>{
    const ne=normEmail(p.email);
    const hasForm=formEmails.has(ne);
    const dateCells=dates.map((_,di)=>getActForPupilOnDate(p.email,di));
    return{
      email:p.email,
      name:((p.pref||p.forename||"")+" "+(p.surname||"")).trim(),
      surname:p.surname||"",
      yearGroup:p.yg||"Unknown",
      house:p.house||"",
      dateCells,
      hasForm,
    };
  });
  const byYg={};
  allRows.forEach(r=>{if(!byYg[r.yearGroup])byYg[r.yearGroup]=[];byYg[r.yearGroup].push(r);});

  ygSort(Object.keys(byYg)).forEach(yg=>{
    const ygRows=byYg[yg].sort((a,b)=>a.surname.localeCompare(b.surname));
    const card=h("div",{className:"card mb-16"});
    const hdr=h("div",{className:"card-header flex-between"});
    hdr.appendChild(h("span",{className:"card-title"},yg+" — LEX Timetable ("+ygRows.length+" pupils)"));
    hdr.appendChild(h("button",{className:"btn btn-ghost btn-sm",onClick:()=>{
      const dateHeaders=dates.map(d=>d.label.replace("Sat ","")).join("\t");
      const header="Name\tHouse\t"+dateHeaders;
      const rows=ygRows.map(r=>r.name+"\t"+r.house+"\t"+r.dateCells.join("\t"));
      navigator.clipboard.writeText(yg+" — LEX Timetable\n"+header+"\n"+rows.join("\n")).then(()=>toast(yg+" timetable copied"));
    }},"📋 Copy Table"));
    card.appendChild(hdr);
    const tw=h("div",{style:{overflow:"auto"}});
    const t=h("table",null);
    const thRow=h("tr",null,h("th",null,"Name"),h("th",null,"House"));
    dates.forEach(d=>{
      const thCell=h("th",{style:{textAlign:"center",minWidth:"90px"}},d.label.replace("Sat ",""));
      if(d.note)thCell.appendChild(h("div",{style:{fontSize:"8px",color:"var(--amber)",fontWeight:400}},d.note));
      thRow.appendChild(thCell);
    });
    t.appendChild(h("thead",null,thRow));
    const tb=h("tbody",null);
    ygRows.forEach(r=>{
      const tr=h("tr",null,h("td",{style:{fontWeight:500,whiteSpace:"nowrap"}},r.name),h("td",null,r.house));
      dates.forEach((d,di)=>{
        const actName=r.dateCells[di];
        const isAwaiting=!actName&&!r.hasForm;
        const isUnmatched=actName==="Unmatched";
        const isOverride=!!allocDateOverrides[di+"|"+normEmail(r.email)];
        tr.appendChild(h("td",{style:{textAlign:"center",fontSize:"11px",
          color:isAwaiting?"var(--amber)":isUnmatched?"var(--red)":isOverride?"var(--purple)":actName?gc(actName):"var(--text3)",
          fontWeight:isAwaiting||isUnmatched||!actName?400:500,
          fontStyle:isAwaiting?"italic":"normal",
          background:isOverride?"var(--purple-soft)":"transparent"}},actName||(isAwaiting?"":"—")));
      });
      tb.appendChild(tr);
    });
    t.appendChild(tb);tw.appendChild(t);card.appendChild(tw);el.appendChild(card);
  });
}

function generateFridayNotice(di){
  const out=document.getElementById("notice-output");if(!out)return;out.innerHTML="";
  const d=dates[di];if(!d)return;
  const abd=actsByDate();
  const dayActs=(abd[di]||[]).sort();
  if(!dayActs.length){out.appendChild(h("div",{className:"alert alert-info"},"No activities on this date."));return;}

  const lines=[];
  lines.push("LEX — "+d.label+(d.half==="S1"?" (Summer 1)":" (Summer 2)"));
  if(d.note)lines.push("Note: "+d.note);
  lines.push("");
  dayActs.forEach(actName=>{
    const act=acts.find(a=>a.n===actName);
    if(!act)return;
    const venue=act.v&&act.v!=="TBC"?act.v:"venue TBC";
    const leader=act.lead?staff.find(s=>s.c===act.lead):null;
    const leaderStr=leader?leader.n:"staff TBC";
    const note=act.notes||"";
    let line=act.n+" — "+venue+" ("+leaderStr+")";
    if(note)line+=" — "+note;
    lines.push(line);
  });

  const preview=h("div",{style:{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"14px",fontFamily:"var(--mono)",fontSize:"12px",lineHeight:"1.8",whiteSpace:"pre-wrap"}});
  preview.textContent=lines.join("\n");
  out.appendChild(preview);
  out.appendChild(h("button",{className:"btn btn-primary mt-8",onClick:()=>{
    navigator.clipboard.writeText(lines.join("\n")).then(()=>toast("Friday notice copied"));
  }},"📋 Copy Notice"));
}

        const allocHere=allocByActHalf[a.n+"|"+(dates[di]?dates[di].half:"")]||0;

function renderVenueDirectory(el){
  el.appendChild(h("div",{style:{fontWeight:600,fontSize:"13px",marginBottom:"4px"}},venues.length+" venues in directory"));
  el.appendChild(h("p",{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"12px"}},"Edit venue names (must exactly match what is typed in Activities), responsible staff, and department."));
  const btnRow=h("div",{className:"flex mb-12",style:{gap:"8px",flexWrap:"wrap",alignItems:"flex-start"}});
  btnRow.appendChild(h("button",{className:"btn btn-primary btn-sm",onClick:()=>{
    venues.push({id:"V"+Date.now().toString(36).toUpperCase(),name:"New Venue",staff:"",dept:""});
    saveAll();render();
  }},"+ Add Venue"));
  // CSV upload card
  const csvCard=h("div",{className:"card card-pad",style:{maxWidth:"500px"}});
  csvCard.appendChild(h("div",{style:{fontWeight:600,fontSize:"12px",marginBottom:"4px"}},"Import Venues from CSV / paste"));
  csvCard.appendChild(h("p",{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"6px"}},"Columns: Name, Staff Code, Department. Existing venues with matching names are updated."));
  const vTa=h("textarea",{rows:4,placeholder:"Art\tDRP\tCreative Arts\nCricket Nets\tDOC\tSport",style:{marginBottom:"6px"}});

    const raw=vTa.value.trim();if(!raw){toast("Nothing to import","err");return;}
    const lines=raw.split("\n").filter(l=>l.trim());
    const sep=lines[0].includes("\t")?"\t":",";
    let added=0,updated=0;
    // Skip header if first row looks like a header
    const startLine=lines[0].toLowerCase().includes("name")?1:0;
    lines.slice(startLine).forEach(l=>{
      const c=l.split(sep).map(x=>x.replace(/^"|"$/g,"").trim());
      if(!c[0])return;
      const name=c[0],staff=c[1]||"",dept=c[2]||"";
      const existing=venues.find(v=>v.name.trim().toLowerCase()===name.trim().toLowerCase());
      if(existing){existing.staff=staff||existing.staff;existing.dept=dept||existing.dept;updated++;}
      else{venues.push({id:"V"+Date.now().toString(36)+Math.random().toString(36).slice(2,5),name,staff,dept});added++;}
    });
    saveAll();toast(added+" added, "+updated+" updated");render();
  }},"Import"));
  btnRow.appendChild(csvCard);
  el.appendChild(btnRow);
  const wrap=h("div",{className:"table-wrap scroll-table",style:{maxHeight:"65vh"}});
  const tbl=h("table",null);
  tbl.appendChild(h("thead",null,h("tr",null,...["Venue Name","Staff","Department / Owner","Used in Activities",""].map(x=>h("th",null,x)))));
  const tbody=h("tbody",null);
  const sorted=[...venues].sort((a,b)=>{const da=a.dept||"",db=b.dept||"";return da!==db?da.localeCompare(db):a.name.localeCompare(b.name);});
  let lastDept=null;
  sorted.forEach(v=>{
    const realIdx=venues.indexOf(v);
    const dept=v.dept||"";
    if(dept!==lastDept){
      tbody.appendChild(h("tr",null,h("td",{colSpan:5,style:{background:"var(--surface2)",fontWeight:700,fontSize:"11px",color:"var(--text2)",padding:"5px 10px"}},dept||"Uncategorised")));
      lastDept=dept;
    }
    const usedIn=acts.filter(a=>(a.v||"").trim().toLowerCase()===v.name.trim().toLowerCase()).map(a=>a.n);
    tbody.appendChild(h("tr",null,
      h("td",null,h("input",{value:v.name,style:{width:"150px",fontWeight:600},onInput:e=>{v.name=e.target.value;saveAll();}})),
      h("td",null,h("input",{value:v.staff||"",style:{width:"65px",fontFamily:"var(--mono)"},onInput:e=>{v.staff=e.target.value;saveAll();}})),
      h("td",null,h("input",{value:v.dept||"",style:{width:"145px"},onInput:e=>{v.dept=e.target.value;saveAll();}})),
      h("td",{style:{fontSize:"10px",color:"var(--text3)",maxWidth:"200px",whiteSpace:"normal"}},usedIn.length?usedIn.join(", "):h("span",{style:{color:"var(--border2)"}},"—")),
      h("td",null,h("button",{className:"btn btn-danger btn-xs",onClick:()=>{if(!confirm("Remove "+v.name+"?"))return;venues.splice(realIdx,1);saveAll();render();}},"✕"))
    ));
  });
  tbl.appendChild(tbody);wrap.appendChild(tbl);el.appendChild(wrap);
  el.appendChild(h("div",{className:"alert alert-info mt-12",style:{fontSize:"11px"}},"Venue names must match exactly what is typed in activity records."));
}

// ADMIN REMINDERS
// ═══════════════════════════════════════════════
const TERM_DATES={
  springEnd:new Date(2026,2,26),summerStart:new Date(2026,3,20),
  s1End:new Date(2026,4,22),s2Start:new Date(2026,5,1),s2End:new Date(2026,6,2)
};
function getAdminReminders(){
  const now=new Date();const reminders=[];
  const daysBefore=(target,days)=>{const diff=Math.floor((target-now)/(86400000));return diff>=0&&diff<=days;};
  if(daysBefore(TERM_DATES.s1End,7))reminders.push({t:"warn",m:"Summer 1 ends in "+Math.floor((TERM_DATES.s1End-now)/86400000)+" days — update pupil lists and medical/dietary data before half-term."});
  if(daysBefore(TERM_DATES.s2Start,3))reminders.push({t:"info",m:"Summer 2 starts soon — check pupil lists and medical/dietary data are up to date."});
  if(daysBefore(TERM_DATES.s2End,7))reminders.push({t:"warn",m:"Summer 2 ends in "+Math.floor((TERM_DATES.s2End-now)/86400000)+" days — final check on pupil data and allocations."});
  if(daysBefore(TERM_DATES.springEnd,7))reminders.push({t:"info",m:"Spring term ending soon — archive term data in Settings > New Term if needed."});
  return reminders;
}

function renderChecks(el){
  const us=getUnstaffed();const cl=getClashes();const issues=[];
  acts.forEach(a=>{
    if(!a.cap&&a.di.length>0)issues.push({t:"warn",m:a.n+": Capacity TBC"});
    if(!a.lead&&a.di.length>0)issues.push({t:"warn",m:a.n+": Staff lead TBC"});
    if(a.di.length>0&&(!a.ra||a.ra==="needed"))issues.push({t:"warn",m:a.n+": Risk assessment "+(a.ra==="needed"?"additional RA needed":"status not set")});
    if(a.di.length>0&&a.provRA==="requested")issues.push({t:"info",m:a.n+": Provider RA requested but not yet received"});
  });
  Object.entries(us).forEach(([di,al])=>{al.forEach(a=>issues.push({t:"info",m:a+" on "+dates[di]?.label+": no staff assigned"}));});
  cl.forEach(k=>{const p=k.split("|");issues.push({t:"error",m:"CLASH: "+p[1]+" double-booked on "+dates[Number(p[0])]?.label});});
  if(pupils.length===0)issues.push({t:"warn",m:"No pupils imported yet"});
  if(!allocRes)issues.push({t:"info",m:"Allocation not yet run"});

  el.appendChild(h("div",{className:"page-header"},h("h2",null,"Pre-Flight Checks")));

  const errs=issues.filter(i=>i.t==="error").length;
  const warns=issues.filter(i=>i.t==="warn").length;
  const infos=issues.filter(i=>i.t==="info").length;

  el.appendChild(h("div",{className:"stats-row mb-16"},
    h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:errs>0?"var(--red)":"var(--green)"}},errs),h("div",{className:"stat-label"},"Errors")),
    h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:warns>0?"var(--amber)":"var(--green)"}},warns),h("div",{className:"stat-label"},"Warnings")),
    h("div",{className:"stat-card"},h("div",{className:"stat-val",style:{color:"var(--text3)"}},infos),h("div",{className:"stat-label"},"Info"))
  ));

  if(issues.length===0){el.appendChild(h("div",{className:"alert alert-success",style:{fontSize:"14px",fontWeight:600}},"✓ All checks passed — ready to go!"));return;}
  issues.forEach(x=>{el.appendChild(h("div",{className:"alert alert-"+(x.t==="error"?"error":x.t==="warn"?"warn":"info")},x.m));});
}

        saveAll();toast(sn+" removed");rebuildAdminPreserveScroll();
      }},"✕");})())
    ));
  });
  st2.appendChild(sb);sw.appendChild(st2);el.appendChild(sw);

  // Prior term YTD import
  el.appendChild(h("hr",{className:"section-divider"}));
  el.appendChild(h("div",{style:{fontWeight:600,marginBottom:"4px"}},"Prior Term YTD Data"));
  el.appendChild(h("p",{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"8px"}},"Paste tab-separated data: Surname or Staff Code (column A) and Weighted Score (column B). Matches on surname or code automatically."));
  const ytdTa=h("textarea",{rows:4,placeholder:"Archer\t0.69\nBaker\t0\nBarratt\t0.75\n— or use staff codes —\nNJA\t0.69\nDB\t0",style:{marginBottom:"8px"}});
  // Show current priorYTD
  if(Object.keys(priorYTD).length>0){
    const ytdInfo=h("div",{style:{fontSize:"11px",color:"var(--green)",marginBottom:"6px"}},Object.keys(priorYTD).length+" staff have prior YTD data loaded");
    el.appendChild(ytdInfo);
    // Show loaded values
    const ytdPreview=h("div",{style:{fontSize:"10px",color:"var(--text3)",marginBottom:"8px",lineHeight:"1.6"}});
    Object.entries(priorYTD).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).forEach(([code,val])=>{
      const s=staff.find(st=>st.c===code);
      ytdPreview.appendChild(h("span",{style:{marginRight:"10px"}},( s?s.n:code)+": "+val.toFixed(2)));
    });
    el.appendChild(ytdPreview);
  }
  el.appendChild(ytdTa);
  el.appendChild(h("div",{className:"flex"},
    h("button",{className:"btn btn-primary btn-sm",onClick:()=>{
      const lines=ytdTa.value.trim().split("\n").filter(l=>l.trim());
      let count=0,unmatched=[];
      lines.forEach(l=>{
        const sep=l.includes("\t")?"\t":",";
        const parts=l.split(sep).map(x=>x.trim());
        if(parts.length<2||!parts[0])return;
        const identifier=parts[0];
        const score=parseFloat(parts[1])||0;
        // Try to match: exact code → exact surname → starts-with → contains
        let matched=staff.find(s=>s.c===identifier);
        if(!matched){
          const idLower=identifier.toLowerCase();
          matched=staff.find(s=>(s.n||"").toLowerCase()===idLower);
        }
        if(!matched){
          const idLower=identifier.toLowerCase();
          // Try starts-with (handles "Dorey" matching "Dorey E" or "Dorey R")
          const startMatches=staff.filter(s=>(s.n||"").toLowerCase().startsWith(idLower)||idLower.startsWith((s.n||"").toLowerCase()));
          if(startMatches.length===1)matched=startMatches[0];
        }
        if(!matched){
          const idLower=identifier.toLowerCase();
          matched=staff.find(s=>(s.n||"").toLowerCase().includes(idLower)||idLower.includes((s.n||"").toLowerCase()));
        }
        if(matched){
          priorYTD[matched.c]=score;count++;
        }else{
          // Store under the identifier as-is in case it's a code we don't have yet
          priorYTD[identifier]=score;count++;
          unmatched.push(identifier);
        }
      });
      saveAll();
      let msg=count+" prior YTD entries loaded";
      if(unmatched.length>0)msg+=" ("+unmatched.length+" not matched to known staff: "+unmatched.slice(0,5).join(", ")+(unmatched.length>5?"…":"")+")";
      // Show first few matched entries for confirmation
      const matchedEntries=Object.entries(priorYTD).filter(([,v])=>v>0).slice(0,5).map(([k,v])=>{const s=staff.find(st=>st.c===k);return(s?s.n:k)+":"+v.toFixed(2);});
      if(matchedEntries.length>0)msg+=" — e.g. "+matchedEntries.join(", ");
      toast(msg);render();
    }},"Load YTD Data"),
    h("button",{className:"btn btn-ghost btn-sm",onClick:()=>{
      priorYTD={};saveAll();toast("Prior YTD cleared");render();
    }},"Clear YTD")
  ));
}

    c.appendChild(h("input",{value:d.note||"",placeholder:"Add note…",style:{width:"100%",marginTop:"8px",fontSize:"11px"},onInput:e=>{d.note=e.target.value;saveAll();}}));
    c.appendChild(h("button",{className:"btn btn-danger btn-xs",style:{position:"absolute",top:"8px",right:"8px"},onClick:()=>{
      if(!confirm("Remove "+d.label+"?"))return;
      acts.forEach(a=>{a.di=a.di.filter(x=>x!==i).map(x=>x>i?x-1:x);});
      const newSA={};Object.entries(sa).forEach(([k,v])=>{const[di,code]=k.split("|");const n=Number(di);if(n===i)return;newSA[(n>i?n-1:n)+"|"+code]=v;});
      sa=newSA;dates.splice(i,1);saveAll();render();
    }},"✕"));
    dw.appendChild(c);
  });
  el.appendChild(dw);

  const addCard=h("div",{className:"card card-pad",style:{maxWidth:"440px"}});
  addCard.appendChild(h("div",{style:{fontWeight:600,marginBottom:"10px"}},"Add Date"));
  const g=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}});
  const di=h("input",{type:"text",placeholder:"25/04/2026",style:{width:"100%"}});
  const li=h("input",{type:"text",placeholder:"Sat 25 Apr",style:{width:"100%"}});
  const hs=h("select",{style:{width:"100%"}},h("option",{value:"S1"},"Summer 1"),h("option",{value:"S2"},"Summer 2"));
  const ni=h("input",{type:"text",placeholder:"Optional note",style:{width:"100%"}});
  [[di,"Date (DD/MM/YYYY)"],[li,"Label"],[hs,"Half-term"],[ni,"Note"]].forEach(([inp,lbl])=>{g.appendChild(h("div",null,h("label",{className:"field-label"},lbl),inp));});
  addCard.appendChild(g);
  addCard.appendChild(h("button",{className:"btn btn-success",style:{marginTop:"10px"},onClick:()=>{
    if(!di.value||!li.value){toast("Enter date and label","err");return;}
    dates.push({full:di.value,half:hs.value,label:li.value,note:ni.value});
    saveAll();toast("Date added");render();
  }},"Add Date"));
  el.appendChild(addCard);
}

function renderAdminBulk(el){

  [[

    (csv,sep)=>{
      const lines=csv.split("\n");let count=0;

      saveAll();toast(count+" activities imported — set dates in Activities tab");render();

function renderAdminNewTerm(el){
  el.appendChild(h("div",{style:{fontWeight:600,fontSize:"14px",marginBottom:"6px"}},"Term Management"));

  // Archive + new term
  const archCard=h("div",{className:"card card-pad mb-16"});
  archCard.appendChild(h("div",{style:{fontWeight:600,marginBottom:"6px"}},"Start a New Term"));
  archCard.appendChild(h("p",{style:{fontSize:"12px",color:"var(--text3)",marginBottom:"12px"}},"Archives the current term data to localStorage under a name you choose, then clears activities, dates, and staff allocations. Staff and pupils are kept."));
  const termNameInp=h("input",{type:"text",placeholder:"e.g. Autumn 2026",style:{width:"200px",marginBottom:"10px"}});
  archCard.appendChild(h("div",null,h("label",{className:"field-label"},"Archive current term as:"),termNameInp));
  archCard.appendChild(h("button",{className:"btn btn-primary",onClick:()=>{
    const name=termNameInp.value.trim();if(!name){toast("Enter a term name","err");return;}
    const archive={name,acts:JSON.parse(JSON.stringify(acts)),dates:JSON.parse(JSON.stringify(dates)),sa:JSON.parse(JSON.stringify(sa)),allocRes,timestamp:new Date().toISOString()};
    try{
      const archives=JSON.parse(localStorage.getItem("lex10-archives")||"[]");
      archives.push(archive);localStorage.setItem("lex10-archives",JSON.stringify(archives));
    }catch(e){toast("Archive save error: "+e.message,"err");return;}
    // Save allocRes into allocHistory as a term snapshot
    if(allocRes&&allocRes.length>0){
      if(!allocHistory)allocHistory=[];
      allocRes.forEach(r=>{
        const existing=allocHistory.find(h=>normEmail(h.email)===normEmail(r.email)&&h.half===r.half&&h.term===name);
        if(!existing)allocHistory.push({...r,term:name,archivedAt:new Date().toISOString()});
      });
    }
    acts=[];dates=[];sa={};allocRes=null;allocLog=[];formData=[];
    saveAll();toast("Archived as '"+name+"' — allocation history saved. Ready for new term.");render();
  }},"Archive & Start New Term"));
  // Standalone "Save Results to History" button (without archiving)
  const saveHistBtn=h("button",{className:"btn btn-ghost",style:{marginLeft:"8px"},onClick:()=>{
    if(!allocRes||!allocRes.length){toast("No allocation results to save","err");return;}
    const name=termNameInp.value.trim()||(new Date().toLocaleDateString("en-GB",{month:"short",year:"numeric"}));
    if(!allocHistory)allocHistory=[];
    let saved=0;
    allocRes.forEach(r=>{
      const existing=allocHistory.find(h=>normEmail(h.email)===normEmail(r.email)&&h.half===r.half&&h.term===name);
      if(!existing){allocHistory.push({...r,term:name,archivedAt:new Date().toISOString()});saved++;}
    });
    saveAll();toast("Saved "+saved+" results to allocation history under '"+name+"'");
  }},"💾 Save Current Results to History");
  archCard.appendChild(saveHistBtn);
  el.appendChild(archCard);

  // View archives
  let archives=[];
  try{archives=JSON.parse(localStorage.getItem("lex10-archives")||"[]");}catch(e){}
  if(archives.length>0){
    const archViewCard=h("div",{className:"card card-pad mb-16"});
    archViewCard.appendChild(h("div",{style:{fontWeight:600,marginBottom:"8px"}},"Archived Terms ("+archives.length+")"));
    archives.forEach((a,i)=>{
      const row=h("div",{className:"flex-between",style:{padding:"8px 0",borderBottom:"1px solid var(--border)"}});
      row.appendChild(h("div",null,h("div",{style:{fontWeight:600,fontSize:"12px"}},a.name),h("div",{style:{fontSize:"10px",color:"var(--text3)"}},new Date(a.timestamp).toLocaleDateString()+" · "+a.acts.length+" activities · "+a.dates.length+" dates")));
      row.appendChild(h("div",{className:"flex"},
        h("button",{className:"btn btn-ghost btn-sm",onClick:()=>{
          if(!confirm("Restore '"+a.name+"'? Current term will be overwritten."))return;
          acts=a.acts;dates=a.dates;sa=a.sa;allocRes=a.allocRes||null;
          saveAll();toast("Restored: "+a.name);render();
        }},"Restore"),
        h("button",{className:"btn btn-danger btn-xs",onClick:()=>{
          if(!confirm("Delete archive '"+a.name+"'?"))return;
          archives.splice(i,1);localStorage.setItem("lex10-archives",JSON.stringify(archives));render();
        }},"✕")
      ));
      archViewCard.appendChild(row);
    });
    el.appendChild(archViewCard);
  }

  // Full reset
  el.appendChild(h("hr",{className:"section-divider"}));
  el.appendChild(h("div",{style:{fontWeight:600,marginBottom:"6px"}},"Full Reset"));
  el.appendChild(h("p",{style:{fontSize:"12px",color:"var(--text3)",marginBottom:"10px"}},"Restore all data to Summer 2026 defaults. Cannot be undone."));
  el.appendChild(h("button",{className:"btn btn-ghost btn-sm",onClick:()=>{
    if(!confirm("Reset ALL data to Summer 2026 defaults?"))return;
    if(!confirm("Second confirmation — this cannot be undone."))return;
    ["lex10-acts","lex10-staff","lex10-sa","lex10-pupils","lex10-dates","lex10-archives"].forEach(k=>localStorage.removeItem(k));
    location.reload();
  }},"Reset to Defaults"));
}

document.addEventListener("click",e=>{
  if(!e.target.closest(".cell-popup")&&!e.target.closest("td"))
    document.querySelectorAll(".cell-popup").forEach(p=>p.remove());
  if(!e.target.closest(".cap-pupil-popup")&&!e.target.closest("td"))

    if(!p.contains(e.target)&&!p.parentElement.contains(e.target))p.remove();
  });
});

// Staff view routing
function isStaffView(){return location.hash==="#staff";}

function renderStaffView(){
  const app=document.getElementById("app");app.innerHTML="";
  app.appendChild(h("div",{style:{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"14px 24px",display:"flex",alignItems:"center",gap:"12px",position:"sticky",top:0,zIndex:50}},
    h("div",{className:"logo-mark"},"L"),
    h("div",null,h("div",{style:{fontWeight:700,fontSize:"15px"}},"LEX — My Schedule"),h("div",{style:{fontSize:"11px",color:"var(--text3)"}},"Clayesmore Summer 2026")),
    h("a",{href:"#",style:{marginLeft:"auto",fontSize:"11px",color:"var(--text3)",textDecoration:"none",padding:"4px 8px",border:"1px solid var(--border)",borderRadius:"4px"}},"Admin")
  ));
  const main=h("div",{style:{padding:"24px",maxWidth:"900px",margin:"0 auto"}});
  const entryCard=h("div",{className:"card card-pad",style:{marginBottom:"20px",maxWidth:"400px"}});
  entryCard.appendChild(h("label",{className:"field-label"},"Enter your staff code or surname"));
  const codeInp=h("input",{type:"text",placeholder:"e.g. GHK or King",style:{width:"100%",marginBottom:"4px"},onInput:e=>{buildSchedule(e.target.value.trim());}});
  entryCard.appendChild(codeInp);
  entryCard.appendChild(h("p",{style:{fontSize:"11px",color:"var(--text3)"}},"Your schedule updates as you type."));
  main.appendChild(entryCard);
  const schedDiv=h("div",null);
  main.appendChild(schedDiv);
  app.appendChild(main);

  function buildSchedule(query){
    schedDiv.innerHTML="";
    if(!query||query.length<2)return;
    const q=query.toLowerCase();
    const found=staff.filter(s=>s.c.toLowerCase()===q||s.n.toLowerCase().includes(q)||s.c.toLowerCase().startsWith(q));
    if(!found.length){schedDiv.appendChild(h("div",{className:"alert alert-info"},'No staff found for "'+query+'". Try your initials or surname.'));return;}
    if(found.length>4){schedDiv.appendChild(h("div",{className:"alert alert-info"},"Multiple matches — be more specific."));return;}
    found.forEach(s=>{
      const rows=dates.map((_,di)=>{const n=sa[di+"|"+s.c];if(!n)return null;return{di,n,act:acts.find(a=>a.n===n),date:dates[di]};}).filter(Boolean);
      const card=h("div",{className:"card",style:{marginBottom:"16px"}});
      const sh=h("div",{className:"card-header"});
      sh.appendChild(h("div",null,h("div",{style:{fontWeight:700,fontSize:"16px"}},s.n),h("div",{style:{fontSize:"11px",color:"var(--text3)",marginTop:"2px"}},s.c+(s.r?" • "+s.r:""))));
      sh.appendChild(h("span",{style:{fontSize:"12px",color:"var(--text3)"}},rows.length+" sessions"));
      card.appendChild(sh);
      if(!rows.length){card.appendChild(h("div",{style:{padding:"16px",color:"var(--text3)",fontSize:"12px"}},"No sessions assigned yet."));}
      else{
        ["S1","S2"].forEach(half=>{
          const hr=rows.filter(r=>r.date&&r.date.half===half);if(!hr.length)return;
          const sec=h("div",{style:{padding:"12px 16px",borderBottom:"1px solid var(--border)"}});
          sec.appendChild(h("div",{style:{fontWeight:600,fontSize:"12px",color:half==="S1"?"var(--accent)":"var(--green)",marginBottom:"8px"}},half==="S1"?"Summer 1":"Summer 2"));
          const grid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"8px"}});
          hr.forEach(({n,act,date})=>{
            const col=gc(n);
            const tile=h("div",{style:{background:col+"12",border:"1px solid "+col+"30",borderRadius:"8px",padding:"10px 12px",borderLeft:"3px solid "+col}});
            tile.appendChild(h("div",{style:{fontWeight:600,fontSize:"12px",color:col}},n));
            tile.appendChild(h("div",{style:{fontSize:"11px",color:"var(--text2)",marginTop:"2px"}},date.label));
            if(act){
              if(act.yg)tile.appendChild(h("div",{style:{fontSize:"10px",color:"var(--text3)"}},"Year "+act.yg));
              if(act.v&&act.v!=="TBC")tile.appendChild(h("div",{style:{fontSize:"10px",color:"var(--text3)"}},act.v));
              if(act.mb)tile.appendChild(h("div",{style:{fontSize:"10px",color:"var(--amber)"}},"Minibus required"));
            }
            if(date.note)tile.appendChild(h("div",{style:{fontSize:"10px",color:"var(--amber)",marginTop:"2px"}},"Note: "+date.note));
            grid.appendChild(tile);
          });
          sec.appendChild(grid);card.appendChild(sec);
        });
      }
      schedDiv.appendChild(card);
    });
    schedDiv.appendChild(h("button",{className:"btn btn-ghost",style:{marginTop:"8px"},onClick:()=>window.print()},"Print my schedule"));
  }
}

function renderAdminSync(el){
  el.appendChild(h("div",{style:{fontWeight:700,fontSize:"14px",marginBottom:"4px"}},"Cloud Sync — Supabase"));
  el.appendChild(h("p",{style:{fontSize:"12px",color:"var(--text3)",marginBottom:"16px",lineHeight:"1.7"}},"Connect to Supabase to sync your data across all admin devices automatically."));

  // Status card
  const ok=supaConnected;
  el.appendChild(h("div",{className:"card card-pad mb-16",style:{background:ok?"var(--green-soft)":"var(--amber-soft)",border:"1px solid "+(ok?"var(--green)":"var(--amber)")}},
    h("div",{style:{fontWeight:700,color:ok?"var(--green)":"var(--amber)",marginBottom:"4px"}},ok?"Connected to Supabase":"Not connected — local only"),
    h("div",{style:{fontSize:"11px",color:"var(--text2)"}},ok?"Saves sync to all admin sessions automatically.":"Changes only visible in this browser.")
  ));

  // SQL
  const sql="create table if not exists lex_data (\n  key text primary key,\n  value jsonb not null,\n  updated_at timestamptz default now()\n);\nalter table lex_data enable row level security;\ncreate policy \"public read\" on lex_data for select using (true);\ncreate policy \"public write\" on lex_data for all using (true);";
  el.appendChild(h("div",{className:"card card-pad mb-16"},
    h("div",{style:{fontWeight:600,marginBottom:"6px"}},"SQL (run once in Supabase SQL Editor — already done? skip to credentials)"),
    h("pre",{style:{fontFamily:"var(--mono)",fontSize:"10px",background:"var(--surface2)",padding:"10px",borderRadius:"6px",lineHeight:"1.7",whiteSpace:"pre-wrap",color:"var(--text2)"}},sql),
    h("button",{className:"btn btn-ghost btn-sm",style:{marginTop:"6px"},onClick:()=>{navigator.clipboard.writeText(sql).then(()=>toast("SQL copied"));}},"Copy SQL")
  ));

  // Credentials
  const urlInp=h("input",{type:"text",placeholder:"https://xxxxxxxxxxxx.supabase.co",value:SUPA_URL,style:{width:"100%",marginBottom:"8px",fontFamily:"var(--mono)",fontSize:"11px"}});
  const keyInp=h("input",{type:"password",placeholder:"eyJhbGci... (anon public key)",value:SUPA_KEY,style:{width:"100%",marginBottom:"10px",fontFamily:"var(--mono)",fontSize:"11px"}});
  const credCard=h("div",{className:"card card-pad mb-16"},
    h("div",{style:{fontWeight:600,marginBottom:"10px"}},"Your credentials"),
    h("p",{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"8px"}},"Supabase dashboard → Settings (cog) → API → copy Project URL and anon public key"),
    h("label",{className:"field-label"},"Project URL"),urlInp,
    h("label",{className:"field-label"},"Anon public key (first key shown, not service_role)"),keyInp
  );
  const btnRow=h("div",{className:"flex"});
  btnRow.appendChild(h("button",{className:"btn btn-primary",onClick:async()=>{
    const url=urlInp.value.trim(),key=keyInp.value.trim();
    if(!url||!key){toast("Enter both URL and key","err");return;}
    SUPA_URL=url;SUPA_KEY=key;
    localStorage.setItem("lex11-supa-url",url);localStorage.setItem("lex11-supa-key",key);
    initSupabase();
    if(supaConnected){toast("Connected! Now click Push to upload your data.");updateSyncBadge();render();}
    else toast("Connection failed — check your URL and key","err");
  }},"Connect"));
  if(supaConnected){
    btnRow.appendChild(h("button",{className:"btn btn-success",onClick:async()=>{
      // Safety check: compare local record counts against what's in Supabase
      toast("Checking Supabase before upload...");
      const remoteAllocRes=await supaGet("lex11-allocres");
      const remotePupils=await supaGet("lex11-pupils");
      const remoteAllocCount=Array.isArray(remoteAllocRes)?remoteAllocRes.length:0;
      const remotePupilCount=Array.isArray(remotePupils)?remotePupils.length:0;
      const localAllocCount=Array.isArray(allocRes)?allocRes.length:0;
      const localPupilCount=Array.isArray(pupils)?pupils.length:0;
      const warnings=[];
      if(remoteAllocCount>0&&localAllocCount===0)warnings.push("Supabase has "+remoteAllocCount+" allocation results but you have NONE locally — pushing will wipe them.");
      if(remotePupilCount>0&&localPupilCount===0)warnings.push("Supabase has "+remotePupilCount+" pupils but you have NONE locally — pushing will wipe them.");
      if(remoteAllocCount>localAllocCount*1.5&&localAllocCount>0)warnings.push("Supabase has "+remoteAllocCount+" allocation results but you only have "+localAllocCount+" locally — you may be overwriting a more complete dataset.");
      if(remotePupilCount>localPupilCount*1.2&&localPupilCount>0)warnings.push("Supabase has "+remotePupilCount+" pupils but you only have "+localPupilCount+" locally.");
      if(warnings.length>0){
        const msg="⚠️ PUSH WARNING:\n\n"+warnings.join("\n\n")+"\n\nPushing will overwrite Supabase with your local data.\n\nAre you sure you want to continue?";
        if(!confirm(msg))return;
      }
      toast("Uploading...");
      const ok=await migrateToSupabase();
      if(ok){toast("All data pushed to Supabase ✓");updateSyncBadge();render();}
      else toast("Upload failed — open browser console for details","err");
    }},"Push local data to Supabase"));
    btnRow.appendChild(h("button",{className:"btn btn-ghost",onClick:async()=>{
      // Safety check: warn if pulling would overwrite more local data than is in Supabase
      const remoteAllocRes=await supaGet("lex11-allocres");
      const remotePupils=await supaGet("lex11-pupils");
      const remoteAllocCount=Array.isArray(remoteAllocRes)?remoteAllocRes.length:0;
      const remotePupilCount=Array.isArray(remotePupils)?remotePupils.length:0;
      const localAllocCount=Array.isArray(allocRes)?allocRes.length:0;
      const localPupilCount=Array.isArray(pupils)?pupils.length:0;
      const warnings=[];
      if(localAllocCount>0&&remoteAllocCount===0)warnings.push("Supabase has NO allocation results but you have "+localAllocCount+" locally — pulling will wipe your local data.");
      if(localPupilCount>0&&remotePupilCount===0)warnings.push("Supabase has NO pupils but you have "+localPupilCount+" locally — pulling will wipe your local pupil list.");
      if(localAllocCount>remoteAllocCount*1.5&&remoteAllocCount>0)warnings.push("You have "+localAllocCount+" allocation results locally but Supabase only has "+remoteAllocCount+" — your local copy looks more complete.");
      let msg="Pull from Supabase? This overwrites your local copy.";
      if(warnings.length>0)msg="⚠️ PULL WARNING:\n\n"+warnings.join("\n\n")+"\n\nPulling will overwrite your local data with Supabase.\n\nAre you sure?";
      if(!confirm(msg))return;
      await loadFromSupabase();saveLocal();toast("Pulled from Supabase ✓");render();
    }},"Pull from Supabase"));
    btnRow.appendChild(h("button",{className:"btn btn-danger btn-sm",onClick:()=>{
      if(!confirm("Disconnect?"))return;
      SUPA_URL="";SUPA_KEY="";
      localStorage.removeItem("lex11-supa-url");localStorage.removeItem("lex11-supa-key");
      supaClient=null;supaConnected=false;syncStatus="local";
      toast("Disconnected");render();
    }},"Disconnect"));
  }
  credCard.appendChild(btnRow);
  el.appendChild(credCard);

  // Staff URL
  const staffUrl=location.href.replace(/#.*/,"")+"#staff";
  el.appendChild(h("div",{className:"card card-pad"},
    h("div",{style:{fontWeight:600,marginBottom:"6px"}},"Staff view URL"),
    h("p",{style:{fontSize:"12px",color:"var(--text2)",marginBottom:"8px",lineHeight:"1.6"}},"Send this link to all staff. They type their name or code and see their own schedule. No login needed."),
    h("div",{style:{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"6px",padding:"8px 12px",fontFamily:"var(--mono)",fontSize:"11px",marginBottom:"8px",wordBreak:"break-all"}},staffUrl),
    h("div",{className:"flex"},
      h("button",{className:"btn btn-primary btn-sm",onClick:()=>{navigator.clipboard.writeText(staffUrl).then(()=>toast("Staff URL copied"));}},"Copy staff URL"),
      h("a",{href:"#staff",className:"btn btn-ghost btn-sm",style:{textDecoration:"none"}},"Preview staff view")
    )
  ));
}

window.addEventListener("hashchange",()=>{if(isStaffView())renderStaffView();else render();});
// Auto-refresh from Supabase every 30s for multi-admin sync
let _autoRefresh=null;
let _lastSaveTime=0;
function startAutoRefresh(){
  if(_autoRefresh)clearInterval(_autoRefresh);
  _autoRefresh=setInterval(async()=>{
    if(!supaConnected||!supaClient)return;
    // Don't pull if a save happened in the last 5 seconds (user is actively editing)
    if(Date.now()-_lastSaveTime<5000)return;
    // Don't pull if we're on an editing tab
    if(currentTab==="admin")return;
    try{await loadFromSupabase();saveLocal();lastSyncTime=new Date();syncStatus="online";updateSyncBadge();}
    catch(e){console.error("Auto-refresh failed:",e);}
  },30000);
}
initData().then(()=>{if(isStaffView())renderStaffView();startAutoRefresh();});

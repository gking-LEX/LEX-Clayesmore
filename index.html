<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEX v32 — Clayesmore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f2f1ee;
  --surface:#ffffff;
  --surface2:#f8f7f4;
  --surface3:#eeede9;
  --border:#e0deda;
  --border2:#d0cfc9;
  --text:#1a1916;
  --text2:#5c5a55;
  --text3:#9c9a94;
  --accent:#2563eb;
  --accent-soft:#dbeafe;
  --green:#16a34a;
  --green-soft:#dcfce7;
  --amber:#d97706;
  --amber-soft:#fef3c7;
  --red:#dc2626;
  --red-soft:#fee2e2;
  --purple:#7c3aed;
  --purple-soft:#ede9fe;
  --radius:10px;
  --radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ── DARK MODE ── */
body.theme-dark{
  --bg:#0f0f10;
  --surface:#1a1a1d;
  --surface2:#222226;
  --surface3:#2a2a2f;
  --border:#333338;
  --border2:#44444a;
  --text:#e8e6e1;
  --text2:#a8a59e;
  --text3:#666460;
  --accent:#4f8ef7;
  --accent-soft:#1a2d4a;
  --green:#22c55e;
  --green-soft:#0f2a1a;
  --amber:#f59e0b;
  --amber-soft:#2a1f0a;
  --red:#f87171;
  --red-soft:#2a1010;
  --purple:#a78bfa;
  --purple-soft:#1e1530;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 12px rgba(0,0,0,.4),0 2px 4px rgba(0,0,0,.2);
  --shadow-lg:0 12px 32px rgba(0,0,0,.5),0 4px 8px rgba(0,0,0,.3);
}
/* ── FONT FAMILIES ── */
body.font-dmsans{--font:'DM Sans',system-ui,sans-serif;}
body.font-inter{--font:'Inter',system-ui,sans-serif;}
body.font-serif{--font:'Source Serif 4',Georgia,serif;}
body.font-system{--font:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
/* ── FONT SIZE ── */
body.fsize-sm{font-size:11px;}
body.fsize-sm th,body.fsize-sm td{font-size:10px;}
body.fsize-sm .card-title{font-size:11px;}
body.fsize-sm .btn{font-size:10px;}
body.fsize-sm .badge{font-size:9px;}
body.fsize-sm .nav-btn{font-size:11px;}
body.fsize-sm .page-header h2{font-size:17px;}
body.fsize-md{font-size:13px;}
body.fsize-lg{font-size:15px;}
body.fsize-lg th,body.fsize-lg td{font-size:14px;}
body.fsize-lg .card-title{font-size:15px;}
body.fsize-lg .btn{font-size:13px;}
body.fsize-lg .badge{font-size:11px;}
body.fsize-lg .nav-btn{font-size:13px;}
body.fsize-lg .page-header h2{font-size:23px;}
body.fsize-lg input,body.fsize-lg select,body.fsize-lg textarea{font-size:14px;}
body.fsize-xl{font-size:17px;}
body.fsize-xl th,body.fsize-xl td{font-size:15px;}
body.fsize-xl .card-title{font-size:16px;}
body.fsize-xl .btn{font-size:14px;}
body.fsize-xl .badge{font-size:12px;}
body.fsize-xl .nav-btn{font-size:14px;}
body.fsize-xl .page-header h2{font-size:25px;}
body.fsize-xl input,body.fsize-xl select,body.fsize-xl textarea{font-size:15px;}
/* ── DENSITY ── */
body.density-compact .card-pad{padding:10px;}
body.density-compact .card-header{padding:8px 12px;}
body.density-compact th,body.density-compact td{padding:5px 7px;}
body.density-compact .stat-card{padding:8px 12px;}
body.density-compact .main{padding:12px;}
body.density-compact .stats-row{gap:8px;margin-bottom:12px;}
body.density-spacious .card-pad{padding:24px;}
body.density-spacious .card-header{padding:18px 24px;}
body.density-spacious th,body.density-spacious td{padding:11px 14px;}
body.density-spacious .stat-card{padding:20px 24px;}
body.density-spacious .stat-val{font-size:30px;}
body.density-spacious .main{padding:32px;}
body.density-spacious .stats-row{gap:16px;margin-bottom:24px;}
/* ── PREFERENCES PANEL ── */
.pref-overlay{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .2s;}
.pref-overlay.open{opacity:1;pointer-events:all;}
.pref-panel{position:fixed;top:0;right:0;bottom:0;width:300px;z-index:901;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column;}
.pref-panel.open{transform:translateX(0);}
.pref-panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.pref-section{padding:16px 20px;border-bottom:1px solid var(--border);}
.pref-section-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.pref-row{display:flex;gap:6px;flex-wrap:wrap;}
.pref-btn{padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;font-family:var(--font);cursor:pointer;transition:all .15s;}
.pref-btn:hover{border-color:var(--accent);color:var(--text);}
.pref-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
.pref-preview{margin-top:10px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);font-size:12px;color:var(--text2);line-height:1.6;}
.theme-dark .sticky-l{background:var(--surface);}
.theme-dark tr:hover .sticky-l{background:var(--surface2);}
.theme-dark .sticky-lt{background:var(--surface2);}
.theme-dark th{background:var(--surface2);}
.theme-dark .topbar,.theme-dark .nav{background:var(--surface);}

/* Layout */
.shell{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:0;height:52px;position:sticky;top:0;z-index:50;}
.logo-mark{width:28px;height:28px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;letter-spacing:-0.02em;flex-shrink:0;}
.logo-text{font-weight:600;font-size:15px;letter-spacing:-0.02em;margin-left:10px;color:var(--text);}
.logo-text span{color:var(--text3);font-weight:400;}
.topbar-meta{margin-left:16px;font-size:11px;color:var(--text3);border-left:1px solid var(--border);padding-left:16px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.term-badge{background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}

/* Nav */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto;}
.nav::-webkit-scrollbar{height:0;}
.nav-btn{padding:10px 14px;font-size:12px;font-weight:500;color:var(--text2);background:transparent;border:none;cursor:pointer;font-family:var(--font);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:6px;}
.nav-btn:hover{color:var(--text);}
.nav-btn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.nav-icon{font-size:13px;opacity:.7;}

/* Main content */
.main{flex:1;padding:24px;max-width:1600px;margin:0 auto;width:100%;transition:padding .2s;}.main.fs-mode{padding:8px;max-width:100%;}
.page-header{margin-bottom:20px;}
.page-header h2{font-size:20px;font-weight:700;letter-spacing:-0.03em;color:var(--text);}
.page-header p{font-size:12px;color:var(--text3);margin-top:2px;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-pad{padding:16px;}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;color:var(--text);}

/* Stats row */
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:120px;box-shadow:var(--shadow);}
.stat-val{font-size:24px;font-weight:700;letter-spacing:-0.04em;color:var(--text);}
.stat-label{font-size:11px;color:var(--text3);margin-top:1px;font-weight:500;}
.stat-sub{font-size:10px;color:var(--text3);margin-top:4px;}

/* Tables */
.table-wrap{overflow:auto;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);width:100%;}
table{border-collapse:collapse;width:100%;font-size:12px;}
th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;color:var(--text);white-space:nowrap;}
th{background:var(--surface2);font-weight:600;font-size:11px;color:var(--text2);position:sticky;top:0;z-index:2;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.sticky-l{position:sticky;left:0;z-index:1;background:var(--surface);}
.sticky-lt{position:sticky;left:0;top:0;z-index:3;background:var(--surface2);}
tr:hover .sticky-l{background:var(--surface2);}

/* Form controls */
input,select,textarea{
  padding:6px 10px;background:var(--surface);color:var(--text);
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  font-size:12px;font-family:var(--font);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
textarea{resize:vertical;width:100%;}
label.field-label{font-size:11px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px;}

/* Buttons */
.btn{padding:6px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(37,99,235,.3);}
.btn-primary:hover{background:#1d4ed8;box-shadow:0 2px 6px rgba(37,99,235,.4);}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover{background:#15803d;}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#b91c1c;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-xs{padding:2px 7px;font-size:10px;border-radius:4px;}
.no-spinner::-webkit-outer-spin-button,.no-spinner::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.no-spinner{-moz-appearance:textfield;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.badge-blue{background:var(--accent-soft);color:var(--accent);}
.badge-green{background:var(--green-soft);color:var(--green);}
.badge-amber{background:var(--amber-soft);color:var(--amber);}
.badge-red{background:var(--red-soft);color:var(--red);}
.badge-purple{background:var(--purple-soft);color:var(--purple);}

/* Alerts */
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:8px;border-left:3px solid;}
.alert-error{background:var(--red-soft);color:var(--red);border-color:var(--red);}
.alert-warn{background:var(--amber-soft);color:var(--amber);border-color:var(--amber);}
.alert-info{background:var(--surface2);color:var(--text2);border-color:var(--border2);}
.alert-success{background:var(--green-soft);color:var(--green);border-color:var(--green);}

/* Flex utils */
.flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.gap-4{gap:4px;}.gap-8{gap:8px;}.gap-16{gap:16px;}
.mb-4{margin-bottom:4px;}.mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}.mb-16{margin-bottom:16px;}.mb-20{margin-bottom:20px;}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}
.w-full{width:100%;}

/* Color dot */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}

/* Alloc cell popup */
.cell-popup{position:absolute;top:calc(100% + 4px);left:0;z-index:200;
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);
  box-shadow:var(--shadow-lg);padding:4px;min-width:160px;max-height:220px;overflow-y:auto;}
.cell-popup-item{padding:7px 10px;font-size:12px;cursor:pointer;border-radius:6px;color:var(--text2);font-family:var(--font);transition:background .1s;}
.cell-popup-item:hover{background:var(--surface2);}
.cell-popup-item.active{font-weight:600;}
.cell-popup-none{color:var(--text3);font-style:italic;}

/* Progress bar */
.prog-bar{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .3s;}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

/* Section divider */
.section-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;pointer-events:none;}
.toast-msg{background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;margin-top:8px;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
.toast-msg.show{opacity:1;transform:translateY(0);}

/* Scrollable constraint */
.scroll-table{overflow:auto;max-height:75vh;}.scroll-table.fs-mode{max-height:calc(100vh - 90px);}
@media print{.topbar,.nav,.btn,button{display:none!important;}.card{box-shadow:none!important;}body{background:#fff!important;}}

/* Mobile responsive */
@media(max-width:768px){
  .topbar{padding:0 12px;height:46px;gap:6px;}
  .logo-text{font-size:13px;margin-left:6px;}
  .topbar-meta{display:none;}
  .nav{padding:0 8px;gap:0;}
  .nav-btn{padding:8px 10px;font-size:11px;gap:4px;}
  .nav-icon{font-size:11px;}
  .main{padding:12px;}
  .stats-row{gap:8px;}
  .stat-card{padding:10px 12px;min-width:90px;}
  .stat-val{font-size:18px;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .table-wrap,.scroll-table{font-size:11px;}
  th,td{padding:6px 7px;font-size:11px;}
  .flex{flex-wrap:wrap;}
  .card-pad{padding:12px;}
  input,select,textarea{font-size:13px;} /* prevent iOS zoom */
}
@media(max-width:480px){
  .topbar{height:42px;}
  .topbar-right .badge{display:none;}
  .topbar-right .term-badge{display:none;}
  .main{padding:8px;}
  .page-header h2{font-size:16px;}
}

/* Sync pulse */
.sync-pulse{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.last-sync{font-size:10px;color:var(--text3);margin-left:4px;}
</style>
</head>

<script>
// Detect network-drive / UNC path — fires before anything else renders
(function(){
  var loc = window.location.href;
  var isUNC = loc.startsWith('file:////') || loc.indexOf('file://__') >= 0 || loc.indexOf('file://\\') >= 0;
  // Also catch file:// paths that go via \server\ (shown as file:////server or file://__server)
  var isNetworkPath = /^file:\/\/\/\/[^/]/.test(loc) || /^file:\/\/__/.test(loc);
  if (isUNC || isNetworkPath) {
    document.addEventListener('DOMContentLoaded', function(){
      var b = document.createElement('div');
      b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#dc2626;color:#fff;padding:14px 24px;font-family:sans-serif;font-size:14px;line-height:1.5;box-shadow:0 2px 8px rgba(0,0,0,.3)';
      b.innerHTML = '<strong>⚠️ LEX cannot run from a network drive.</strong><br>' +
        'This file was opened from a network or shared folder. Browsers block JavaScript on network paths.<br>' +
        '<strong>Fix:</strong> Right-click the file → <em>Save As</em> → save to your <strong>Desktop or C:\\Users\\YourName\\Downloads</strong> (local drive, not a mapped drive) → open from there.<br>' +
        '<small style="opacity:.8">Path detected: ' + loc.slice(0,80) + '</small>';
      document.body.prepend(b);
    });
  }
})();
</script>

<div class="shell" id="app"></div>
<div id="toast"></div>
<div class="pref-overlay" id="pref-overlay" onclick="closePrefPanel()"></div>
<div class="pref-panel" id="pref-panel"></div>

<script>
// ═══════════════════════════════════════════════
// PREFERENCES SYSTEM
// ═══════════════════════════════════════════════
const PREF_KEY="lex11-prefs";
const PREF_DEFAULTS={theme:"light",font:"dmsans",fsize:"md",density:"normal"};
let prefs={...PREF_DEFAULTS};

function loadPrefs(){
  try{const s=localStorage.getItem(PREF_KEY);if(s)prefs={...PREF_DEFAULTS,...JSON.parse(s)};}catch(e){}
  applyPrefs();
}
function savePrefs(){localStorage.setItem(PREF_KEY,JSON.stringify(prefs));}
function applyPrefs(){
  const b=document.body;
  // Theme
  b.classList.toggle("theme-dark",prefs.theme==="dark");
  // Font
  ["font-dmsans","font-inter","font-serif","font-system"].forEach(c=>b.classList.remove(c));
  b.classList.add("font-"+prefs.font);
  // Font size
  ["fsize-sm","fsize-md","fsize-lg","fsize-xl"].forEach(c=>b.classList.remove(c));
  b.classList.add("fsize-"+prefs.fsize);
  // Density
  ["density-compact","density-normal","density-spacious"].forEach(c=>b.classList.remove(c));
  b.classList.add("density-"+prefs.density);
}
function setPref(key,val){prefs[key]=val;savePrefs();applyPrefs();renderPrefPanel();}

let prefPanelOpen=false;
function togglePrefPanel(){
  prefPanelOpen=!prefPanelOpen;
  document.getElementById("pref-overlay").classList.toggle("open",prefPanelOpen);
  document.getElementById("pref-panel").classList.toggle("open",prefPanelOpen);
}
function closePrefPanel(){
  prefPanelOpen=false;
  document.getElementById("pref-overlay").classList.remove("open");
  document.getElementById("pref-panel").classList.remove("open");
}

function renderPrefPanel(){
  const panel=document.getElementById("pref-panel");
  if(!panel)return;
  panel.innerHTML="";
  panel.appendChild(h("div",{className:"pref-panel-header"},
    h("span",{style:{fontWeight:700,fontSize:"14px"}},"🎨 Preferences"),
    h("button",{className:"btn btn-ghost btn-sm",onClick:closePrefPanel},"✕ Close")
  ));

  // Theme
  const themeSection=h("div",{className:"pref-section"});
  themeSection.appendChild(h("div",{className:"pref-section-title"},"Colour Theme"));
  const themeRow=h("div",{className:"pref-row"});
  [["light","☀ Light"],["dark","🌙 Dark"]].forEach(([val,label])=>{
    themeRow.appendChild(h("button",{
      className:"pref-btn"+(prefs.theme===val?" active":""),
      onClick:()=>setPref("theme",val)
    },label));
  });
  themeSection.appendChild(themeRow);
  panel.appendChild(themeSection);

  // Font
  const fontSection=h("div",{className:"pref-section"});
  fontSection.appendChild(h("div",{className:"pref-section-title"},"Typeface"));
  const fontRow=h("div",{className:"pref-row"});
  [["dmsans","DM Sans"],["inter","Inter"],["serif","Serif"],["system","System"]].forEach(([val,label])=>{
    fontRow.appendChild(h("button",{
      className:"pref-btn"+(prefs.font===val?" active":""),
      style:{fontFamily:val==="dmsans"?"'DM Sans',sans-serif":val==="inter"?"'Inter',sans-serif":val==="serif"?"'Source Serif 4',serif":"system-ui,sans-serif"},
      onClick:()=>setPref("font",val)
    },label));
  });
  fontSection.appendChild(fontRow);
  // Preview
  const preview=h("div",{className:"pref-preview"});
  preview.style.fontFamily=prefs.font==="dmsans"?"'DM Sans',sans-serif":prefs.font==="inter"?"'Inter',sans-serif":prefs.font==="serif"?"'Source Serif 4',serif":"system-ui,sans-serif";
  preview.textContent="The quick brown fox — LEX System v29. Activities · Staff · Allocation.";
  fontSection.appendChild(preview);
  panel.appendChild(fontSection);

  // Font size
  const fsSection=h("div",{className:"pref-section"});

function gc(n){return COLORS[Math.abs([...String(n||"")].reduce((a,c)=>a+c.charCodeAt(0),0))%COLORS.length];}

// Robust pupil matching: normalise emails for comparison
function normEmail(e){return(e||"").trim().toLowerCase().replace(/\s+/g,"");}
// Normalise house names to single-letter initial for consistent display
function normaliseHouse(h2){
  if(!h2)return"";const s=h2.trim();if(!s)return"";
  // If already a single letter, return as uppercase
  if(s.length===1)return s.toUpperCase();
  // Map known house names / abbreviations to standard initial
  const houseMap={
    "king's":"K","kings":"K","king":"K",
    "devine":"D","dev":"D","de":"D",
    "wolverton":"W","wolv":"W",
    "cross":"C",
    "alderholt":"A","alder":"A",
    "sandles":"S","sandl":"S",
    "other":"O"
  };
  const k=s.toLowerCase().replace(/[''']/g,"'");
  for(const[pat,init]of Object.entries(houseMap)){if(k===pat||k.startsWith(pat+" ")||k===pat.replace("'",""))return init;}
  // Fall back to first letter uppercase
  return s[0].toUpperCase();
}
function findPupilByEmail(email){
  const ne=normEmail(email);
  return pupils.find(p=>normEmail(p.email)===ne);
}
// Fuzzy activity name matching: find closest match in acts
function findActByName(name){
  if(!name)return null;
  const n=name.trim();
  // Exact match first
  let found=acts.find(a=>a.n===n);if(found)return found;
  // Case-insensitive
  const nl=n.toLowerCase();
  found=acts.find(a=>a.n.toLowerCase()===nl);if(found)return found;
  // Normalise: strip spaces/hyphens/underscores AND treat & and 'and' as equivalent
  const norm=s=>s.toLowerCase()
    .replace(/\s*&\s*/g," and ")   // & → and
    .replace(/[\s\-_]+/g,"");       // strip remaining whitespace/hyphens
  found=acts.find(a=>norm(a.n)===norm(n));if(found)return found;
  // Substring match (name contains or is contained by)
  found=acts.find(a=>norm(a.n).includes(norm(n))||norm(n).includes(norm(a.n)));
  return found||null;
}

function toast(msg,type="ok"){
  const t=document.getElementById("toast");
  const d=document.createElement("div");
  d.className="toast-msg";
  d.style.background=type==="ok"?"#16a34a":type==="err"?"#dc2626":"#1a1916";
  d.textContent=msg;
  t.appendChild(d);
  requestAnimationFrame(()=>{d.classList.add("show");});
  setTimeout(()=>{d.classList.remove("show");setTimeout(()=>d.remove(),300);},2800);
}

function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(el.style,v);}
    else if(k.startsWith("on")&&k.length>2){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="className"){el.className=v;}
    else if(k==="value"&&(el.tagName==="INPUT"||el.tagName==="TEXTAREA")){el.value=v;}
    else if(k==="checked"){el.checked=v;}
    else if(k==="selected"){el.selected=v;}
    else if(k==="disabled"){if(v)el.setAttribute("disabled","");}
    else{el.setAttribute(k,v);}
  });
  ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;if(typeof c==="string"||typeof c==="number")el.appendChild(document.createTextNode(String(c)));else if(c instanceof Node)el.appendChild(c);});
  return el;
}

  // Already in correct format
  if(/^Year \d+$/i.test(r))return r.charAt(0).toUpperCase()+r.slice(1).toLowerCase().replace('year ','Year ');

  if(/^\d+$/.test(r))return 'Year '+r;

  if(m)return 'Year '+m[1];
  return r;
}

function initSupabase(){
  if(!SUPA_URL||!SUPA_KEY){supaClient=null;supaConnected=false;syncStatus="local";return;}
  try{supaClient=supabase.createClient(SUPA_URL,SUPA_KEY);supaConnected=true;syncStatus="online";}
  catch(e){supaClient=null;supaConnected=false;syncStatus="error";console.error(e);}

async function supaGet(key){
  if(!supaClient)return null;
  try{const{data,error}=await supaClient.from("lex_data").select("value").eq("key",key).single();
    if(error&&error.code!=="PGRST116")throw error;
    if(!data)return null;
    const v=data.value;
    // value may be already-parsed (jsonb) or a string — handle both
    if(typeof v==="string"){try{return JSON.parse(v);}catch{return v;}}
    return v;}
  catch(e){console.error("supaGet",key,e);return null;}
}
async function supaSet(key,value){
  if(!supaClient)return false;
  try{
    // Always store as JSON string to avoid jsonb type negotiation issues
    const{error}=await supaClient.from("lex_data").upsert({key,value:JSON.stringify(value),updated_at:new Date().toISOString()});
    if(error)throw error;return true;}
  catch(e){console.error("supaSet",key,e);return false;}
}

// Returns {actName|half: count} correctly accounting for both engine results AND manual overrides
// This is the single source of truth for capacity display everywhere
function getAllocByActHalf(){
  const m={};
  if(!allocRes)return m;
  // Start from engine results
  allocRes.filter(r=>r.alloc&&r.alloc!=="__UNASSIGNED__").forEach(r=>{
    const k=r.alloc+"|"+r.half;m[k]=(m[k]||0)+1;
  });
  // Apply half-term overrides: subtract old alloc, add new
  ["s1","s2"].forEach(ht=>{
    const half=ht.toUpperCase();
    Object.entries(allocOverrides[ht]||{}).forEach(([email,newAct])=>{
      const ne=normEmail(email);
      const engRes=allocRes.find(r=>normEmail(r.email)===ne&&r.half===half);
      // Remove from old bucket
      if(engRes&&engRes.alloc&&engRes.alloc!=="__UNASSIGNED__"){
        const oldK=engRes.alloc+"|"+half;
        if(m[oldK]>0)m[oldK]--;
      }
      // Add to new bucket (unless unassigned)
      if(newAct&&newAct!=="__UNASSIGNED__"){
        const newK=newAct+"|"+half;m[newK]=(m[newK]||0)+1;
      }
    });
  });
  return m;
}

function actsByDate(){
  const m={};dates.forEach((_,i)=>{m[i]=[];});
  acts.forEach(a=>a.di.forEach(di=>{if(m[di]&&!m[di].includes(a.n))m[di].push(a.n);}));
  Object.values(m).forEach(arr=>arr.sort());return m;
}
function getUnstaffed(){
  const m={};acts.forEach(a=>a.di.forEach(di=>{
    const has=Object.entries(sa).some(([k,v])=>k.startsWith(di+"|")&&v===a.n);
    if(!has){if(!m[di])m[di]=[];m[di].push(a.n);}
  }));return m;
}
// How many staff are assigned to an activity on a given date
function getActStaffOnDate(actName,di){
  return Object.entries(sa).filter(([k,v])=>k.startsWith(di+"|")&&v===actName).map(([k])=>k.split("|")[1]);
}
function getClashes(){
  const ct={};Object.entries(sa).forEach(([k,v])=>{if(!v)return;ct[k]=(ct[k]||0)+1;});
  return new Set(Object.entries(ct).filter(([,c])=>c>1).map(([k])=>k));
}

// Staff allocation tracker with activity weightings
// Weighting: A+B=full session (×wt), A only or B only=half session (×wt×0.5)
// Returns {code: {s1raw, s2raw, tdRaw, s1max, s2max, tdMax, s1frac, s2frac, tdfrac, priorYTD, grandTotal}}
function sessMultiplier(act){
  if(!act)return 1;
  return(act.sess==="A"||act.sess==="B")?0.5:1;
}
function getStaffAllocStats(){
  const s1Di=dates.map((_,i)=>i).filter(i=>dates[i].half==="S1");
  const s2Di=dates.map((_,i)=>i).filter(i=>dates[i].half==="S2");
  // max possible weighted points per half (each date counts as 1 * max weight, full session)
  const maxWt=Math.max(...acts.map(a=>a.wt||1),1);
  const s1max=s1Di.length*maxWt;
  const s2max=s2Di.length*maxWt;
  const tdMax=dates.length*maxWt;
  const NON_COUNTED_DESIGS=new Set(STAFF_DESIGNATIONS.filter(d=>!d.counted).map(d=>d.n));
  const stats={};
  staff.forEach(s=>{
    function sumWt(diArr){
      return diArr.reduce((acc,di)=>{
        const actName=sa[di+"|"+s.c];
        if(!actName)return acc;
        if(NON_COUNTED_DESIGS.has(actName))return acc;
        const act=acts.find(a=>a.n===actName);
        // A-only or B-only counts as half a session
        return acc+(act?(act.wt||1)*sessMultiplier(act):1);
      },0);
    }
    function countDates(diArr){
      return diArr.filter(di=>{const an=sa[di+"|"+s.c];return an&&!NON_COUNTED_DESIGS.has(an);}).length;
    }
    const s1raw=sumWt(s1Di);
    const s2raw=sumWt(s2Di);
    const tdRaw=sumWt(dates.map((_,i)=>i));
    const prior=priorYTD[s.c]||0;
    stats[s.c]={
      s1raw,s2raw,tdRaw,
      s1frac:s1max>0?s1raw/s1max:0,
      s2frac:s2max>0?s2raw/s2max:0,
      tdfrac:tdMax>0?tdRaw/tdMax:0,
      s1max,s2max,tdMax,
      priorYTD:prior,
      grandTotal:tdRaw+prior,
      // Simple date counts for display (excluding non-counted designations)
      s1n:countDates(s1Di),
      s2n:countDates(s2Di),
      alln:countDates(dates.map((_,i)=>i)),
    };
  });
  return stats;
}

function staffSortKey(s){
  const tailIdx=STAFF_TAIL_ORDER.findIndex(t=>(s.n||"").toLowerCase().includes(t.toLowerCase()));
  if(tailIdx>=0)return "ZZ"+String(tailIdx).padStart(2,"0")+(s.n||"");
  // External staff (r==="ext") go after teaching but before tail
  if((s.r||"").toLowerCase()==="ext")return "ZA"+(s.n||"");
  return "AA"+(s.n||"");
}

// Returns acts sorted alpha, then designations at bottom separated by divider
// For select elements: returns array of {value, label, isDivider, isDesig}
function buildActOptions(actList, includeDesignations){
  const sorted=[...actList].sort((a,b)=>(a||"").localeCompare(b||""));
  const desigs=STAFF_DESIGNATIONS.map(d=>d.n);
  const regular=sorted.filter(n=>!desigs.includes(n));
  const inDesig=sorted.filter(n=>desigs.includes(n));
  const result=regular.map(n=>({value:n,label:n}));
  if(includeDesignations!==false&&STAFF_DESIGNATIONS.length>0){
    result.push({isDivider:true,label:"────────────────"});
    STAFF_DESIGNATIONS.forEach(d=>result.push({value:d.n,label:d.n,isDesig:true}));
  }
  return result;
}

}

let allocHalf="S1";

function renderAlloc(el){
  el.appendChild(h("div",{className:"page-header",style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}},
    h("div",null,h("h2",null,"Allocation Engine"),h("p",null,"Parse Google Form responses and allocate pupils to activities — fairness-weighted, with manual overrides")),
    h("button",{className:"btn btn-ghost btn-sm fs-btn",style:{marginLeft:"auto"},onClick:toggleFsMode},"⛶ Full Screen")
  ));

  // Sub-tabs for Alloc page
  const allocSubTabs=["paste","history","run","results"];
  const allocSubLabels={"paste":"📋 Paste Responses","history":"📜 Alloc History","run":"⚡ Run Allocation","results":"📊 Results & Overrides"};
  if(!window._allocSub)window._allocSub="paste";
  if(!window._allocScrollY)window._allocScrollY={};
  const subNav=h("div",{className:"flex mb-16",style:{gap:"4px",flexWrap:"wrap"}});
  const content=h("div",null);

  function rebuildAllocContent(){
    // Save scroll position of current sub-tab
    const scrollable=content.querySelector(".scroll-table,.table-wrap");
    if(scrollable)window._allocScrollY[window._allocSub+"_inner"]=scrollable.scrollTop;
    window._allocScrollY[window._allocSub]=window.scrollY;

    content.innerHTML="";
    Array.from(subNav.children).forEach(b=>{
      const id=b.getAttribute("data-sub");
      b.className="btn "+(window._allocSub===id?"btn-primary":"btn-ghost");
    });
    if(window._allocSub==="paste") renderAllocPaste(content);
    else if(window._allocSub==="history") renderAllocHistory(content);
    else if(window._allocSub==="run") renderAllocRun(content);
    else if(window._allocSub==="results") renderAllocResults(content);

    // Restore scroll position
    requestAnimationFrame(()=>{
      const savedY=window._allocScrollY[window._allocSub]||0;
      window.scrollTo(0,savedY);
      const scrollable2=content.querySelector(".scroll-table,.table-wrap");
      if(scrollable2){const savedInner=window._allocScrollY[window._allocSub+"_inner"]||0;scrollable2.scrollTop=savedInner;}
    });
  }

  allocSubTabs.forEach(st=>{
    const btn=h("button",{
      className:"btn "+(window._allocSub===st?"btn-primary":"btn-ghost"),
      onClick:()=>{window._allocSub=st;rebuildAllocContent();}
    },allocSubLabels[st]);
    btn.setAttribute("data-sub",st);
    subNav.appendChild(btn);
  });
  // Notices shortcut
  subNav.appendChild(h("button",{className:"btn btn-ghost",style:{marginLeft:"auto",color:"var(--accent)"},
    onClick:()=>{currentTab="notices";render();}},"📣 Notices & Timetables ↗"));
  el.appendChild(subNav);
  el.appendChild(content);
  rebuildAllocContent();
}

  const bulkDatesDiv=h("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px",marginTop:"8px",marginBottom:"6px"}});

    qRow.appendChild(h("button",{className:"btn btn-ghost btn-xs",onClick:()=>{dateChecks.forEach(dc=>{dc.cb.checked=fn(dc);});}},lbl));

  const bulkPreview=h("div",{style:{fontSize:"11px",color:"var(--text3)",marginTop:"6px"}});
  function updateBulkPreview(){

  const bulkBtn=h("button",{className:"btn btn-primary",onClick:()=>{

    const ygPupils=pupils.filter(p=>(p.yg||"Unknown")===yg&&p.email);

    let count=0;
    ygPupils.forEach(p=>{
      const em=normEmail(p.email);if(!em)return;

        allocDateOverrides[di+"|"+em]=act;count++;

    toast(ygPupils.length+" pupils × "+selectedDates.length+" dates → "+act+" ("+count+" per-date overrides set)");

    const rostersDiffer=halves.length===2&&([...s1emails].some(e=>!s2emails.has(e))||[...s2emails].some(e=>!s1emails.has(e)));

    if(rostersDiffer){
      boResultDiv.appendChild(h("div",{className:"alert alert-amber mb-12",style:{background:"var(--amber-soft)",borderLeft:"3px solid var(--amber)",padding:"10px 14px",fontSize:"12px",color:"var(--amber)",borderRadius:"var(--radius-sm)"}},"⚠ S1 and S2 rosters differ for "+parentAct+" — sub-groups are shown separately for each half below."));
    }

    let allCopyText="";
    const savedData={s1:[],s2:[]}; // for saving to notepad

    halves.forEach(half=>{
      const halfLabel=half==="S1"?"Summer 1":"Summer 2";
      const allocated=allocRes.filter(r=>r.alloc===parentAct&&r.half===half).map(r=>{
        const p=findPupilByEmail(r.email)||{};
        return{email:normEmail(r.email),name:((p.pref||p.forename||"")+" "+(p.surname||"")).trim()||r.email,surname:p.surname||"",house:(p.house||"").toUpperCase(),yg:p.yg||""};
      }).sort((a,b)=>a.surname.localeCompare(b.surname));

      if(!allocated.length)return;

      // Half header
      const halfHdr=h("div",{style:{fontWeight:700,fontSize:"13px",color:half==="S1"?"var(--accent)":"var(--green)",margin:"16px 0 8px",paddingBottom:"6px",borderBottom:"2px solid "+(half==="S1"?"var(--accent)":"var(--green)")}},halfLabel+" — "+parentAct+" ("+allocated.length+" pupils)");
      boResultDiv.appendChild(halfHdr);

      // Split into groups
      const assigned=new Set();
      const filledGroups=groups.map(g=>({...g,pupils:[]}));
      filledGroups.forEach(g=>{if(!g.allOthers){g.pupils=allocated.filter(p=>g.houses.includes(p.house));g.pupils.forEach(p=>assigned.add(p.email));}});
      filledGroups.forEach(g=>{if(g.allOthers){g.pupils=allocated.filter(p=>!assigned.has(p.email));}});

      // Save to structure for notepad storage
      savedData[half.toLowerCase()]=filledGroups.filter(g=>g.pupils.length>0).map(g=>({name:g.name,houses:g.houses,pupils:g.pupils.map(p=>({email:p.email,name:p.name,house:p.house,yg:p.yg}))}));

      // Check for pupils not assigned to any group
      const allAssigned=new Set(filledGroups.flatMap(g=>g.pupils.map(p=>p.email)));
      const unassigned=allocated.filter(p=>!allAssigned.has(p.email));

      const groupRow=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:"12px",marginBottom:"12px"}});

      let halfText=halfLabel+" — "+parentAct+"\n";
      filledGroups.filter(g=>g.pupils.length>0).forEach(g=>{
        const col=gc(g.name);
        const card=h("div",{className:"card"});
        const ch=h("div",{className:"card-header flex-between",style:{borderLeft:"3px solid "+col}});
        ch.appendChild(h("span",{style:{fontWeight:700,color:col}},g.name+" ("+g.pupils.length+")"));
        ch.appendChild(h("button",{className:"btn btn-ghost btn-xs",onClick:()=>{
          const txt=g.name+" ("+halfLabel+")\n"+g.pupils.map((p,i)=>(i+1)+". "+p.name+" ("+p.house+", Yr "+displayYg(p.yg)+")").join("\n");
          navigator.clipboard.writeText(txt).then(()=>toast(g.name+" "+half+" copied"));
        }},"📋"));
        card.appendChild(ch);
        const list=h("div",{style:{padding:"8px 12px"}});
        g.pupils.forEach((p,i)=>{
          list.appendChild(h("div",{style:{padding:"3px 0",borderBottom:"1px solid var(--border)",fontSize:"12px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("span",{style:{fontWeight:500}},String(i+1)+". "+p.name),
            h("span",{style:{fontSize:"10px",color:"var(--text3)"}},p.house+" · Yr "+displayYg(p.yg))
          ));
        });
        card.appendChild(list);
        groupRow.appendChild(card);
        halfText+="\n"+g.name+":\n"+g.pupils.map((p,i)=>(i+1)+". "+p.name+" ("+p.house+")").join("\n")+"\n";
      });

      boResultDiv.appendChild(groupRow);

      if(unassigned.length>0){
        boResultDiv.appendChild(h("div",{className:"alert alert-warn",style:{fontSize:"11px",marginBottom:"8px"}},"⚠ "+unassigned.length+" pupils not assigned to any group (house not matched): "+unassigned.map(p=>p.name+" ("+p.house+")").join(", ")));
      }

      // Copy this half
      boResultDiv.appendChild(h("button",{className:"btn btn-ghost btn-sm mb-8",onClick:()=>navigator.clipboard.writeText(halfText).then(()=>toast(halfLabel+" sub-groups copied"))},"📋 Copy "+halfLabel+" sub-groups"));
      allCopyText+=halfText+"\n";
    });

    const btnRow=h("div",{className:"flex mt-8",style:{gap:"8px",flexWrap:"wrap"}});
    if(halves.length>1){
      btnRow.appendChild(h("button",{className:"btn btn-primary btn-sm",onClick:()=>navigator.clipboard.writeText(allCopyText).then(()=>toast("All sub-groups copied"))},"📋 Copy All (S1 + S2)"));
    }
    // Save to Notepad / Notices
    btnRow.appendChild(h("button",{className:"btn btn-success btn-sm",onClick:()=>{
      savedSubGroups[parentAct]=savedData;
      saveAll();
      toast("Sub-groups saved — visible in Notepad and Notices timetables");
    }},"💾 Save Sub-Groups to Notepad"));
    boResultDiv.appendChild(btnRow);
  }},"Generate Sub-Groups");

  const groupsGrid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:"12px",marginTop:"10px"}});
  boGroups.forEach((g,i)=>{
    const col=h("div",{className:"card card-pad"});
    col.appendChild(h("div",{style:{fontWeight:600,fontSize:"11px",marginBottom:"6px"}},"Group "+(i+1)));
    col.appendChild(h("div",{style:{marginBottom:"6px"}},g.nameInp));
    col.appendChild(h("label",{className:"field-label",style:{marginBottom:"2px"}},"Houses (Ctrl/Cmd+click multi-select):"));
    col.appendChild(g.houseSel);
    groupsGrid.appendChild(col);
  });

  boCard.appendChild(h("div",{className:"flex mb-8",style:{gap:"8px"}},boActSel,boRunBtn));
  boCard.appendChild(groupsGrid);
  boCard.appendChild(boResultDiv);
  el.appendChild(boCard);
}

function renderAllocRun(el){
  // Explanation of algorithm
  const explCard=h("div",{className:"card card-pad mb-16"});
  explCard.appendChild(h("div",{style:{fontWeight:600,fontSize:"13px",marginBottom:"8px"}},"Allocation Priority Rules"));
  const rules=h("div",{style:{background:"var(--surface2)",borderRadius:"6px",padding:"12px",fontSize:"12px",color:"var(--text2)",lineHeight:"1.8"}});
  rules.appendChild(h("div",null,h("strong",{style:{color:"var(--accent)"}},"1. Manual overrides"),": Applied first — always take precedence."));
  rules.appendChild(h("div",null,h("strong",{style:{color:"var(--accent)"}},"2. Fairness priority"),": Pupils who received 2nd or 3rd choices in previous rounds are prioritised for their 1st choice."));
  rules.appendChild(h("div",null,h("strong",{style:{color:"var(--accent)"}},"3. Repeat penalty"),": If a pupil's 1st choice is an activity they've already done and it's oversubscribed, they're moved down to give others a turn."));

    h("strong",null,"⚠️ Important — Specific Dates: "),

    "Use ",h("strong",null,"Bulk Year-Group Assignment")," (Paste tab) to set per-date overrides for affected pupils, then check ",h("strong",null,"Results by Date")," to confirm. Allocated half-term assignments appear in the main Results & Overrides table; per-date overrides appear only in Results by Date."
  ));

  if(formData.length>0)controls.appendChild(h("span",{className:"badge badge-green"},formData.length+" responses loaded"));
  else controls.appendChild(h("span",{className:"badge badge-red"},"No responses — paste data first"));
  controls.appendChild(h("button",{className:"btn btn-success",style:{padding:"10px 24px",fontSize:"14px"},onClick:()=>{runAllocEngineV12();
    // Re-render just the alloc content area
    const main=document.querySelector(".main");if(main){main.innerHTML="";renderAlloc(main);}
  }},"⚡ Run Allocation (Both Halves)"));
  if(allocRes&&allocRes.length>0){
    controls.appendChild(h("button",{className:"btn btn-primary",onClick:()=>{
      let count=0;
      allocRes.filter(r=>r.alloc&&!r.isOverride).forEach(r=>{
        allocHistory.push({email:r.email,activity:r.alloc,halfTerm:r.half==="S1"?"Summer 1":"Summer 2",choiceIndex:(r.lvl||1)-1});
        count++;
      });
      saveAll();toast(count+" records saved to allocation history for future fairness weighting");
      const main=document.querySelector(".main");if(main){main.innerHTML="";renderAlloc(main);}
    }},"💾 Save Results as History"));
  }
  controls.appendChild(h("button",{className:"btn btn-ghost",onClick:()=>{allocRes=null;allocLog=[];waitingList={};
    const main=document.querySelector(".main");if(main){main.innerHTML="";renderAlloc(main);}
  }},"Clear Results"));
  el.appendChild(controls);

  // Log
  if(allocLog.length>0){
    const logCard=h("div",{className:"card mb-16"});
    logCard.appendChild(h("div",{className:"card-header"},h("span",{className:"card-title"},"Allocation Log")));
    const lw=h("div",{style:{maxHeight:"250px",overflow:"auto",padding:"10px 14px",fontFamily:"var(--mono)",fontSize:"11px",lineHeight:"1.8"}});
    allocLog.forEach(l=>{
      let col="var(--text3)";
      if(l.includes("UNMATCHED")||l.includes("NOT FOUND"))col="var(--red)";
      else if(l.includes("FULL")||l.includes("WARNING")||l.includes("REPEAT PENALTY"))col="var(--amber)";
      else if(l.includes("→"))col="var(--green)";
      else if(l.startsWith("═")||l.startsWith("SUMMARY")||l.startsWith("CAPACITY"))col="var(--accent)";
      else if(l.includes("OVERRIDE"))col="var(--purple)";
      lw.appendChild(h("div",{style:{color:col}},l));
    });
    logCard.appendChild(lw);el.appendChild(logCard);
  }

  // Stats cards
  if(allocRes&&allocRes.length>0){

    const s2Res=allocRes.filter(r=>r.half==="S2");
    const statsRow=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}});
    [["S1","Summer 1",s1Res,"var(--accent)"],["S2","Summer 2",s2Res,"var(--green)"]].forEach(([half,label,res,col])=>{
      if(!res.length)return;
      const st={s1c:res.filter(r=>r.lvl===1).length,s2c:res.filter(r=>r.lvl===2).length,s3c:res.filter(r=>r.lvl===3).length,um:res.filter(r=>!r.alloc).length,ov:res.filter(r=>r.isOverride).length};

        mini.appendChild(h("div",{style:{textAlign:"center",flex:1}},h("div",{style:{fontWeight:700,fontSize:"18px",color:c}},n),h("div",{style:{fontSize:"10px",color:"var(--text3)"}},l)));
      });
      hCard.appendChild(mini);statsRow.appendChild(hCard);
    });
    el.appendChild(statsRow);

    // Waiting list / demand report
    if(Object.keys(waitingList).length>0){
      const wlCard=h("div",{className:"card card-pad mb-16"});
      wlCard.appendChild(h("div",{style:{fontWeight:700,fontSize:"13px",color:"var(--amber)",marginBottom:"8px"}},"Waiting Lists & Demand"));
      wlCard.appendChild(h("p",{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"10px"}},"Activities that filled up. Consider adding capacity or opening a second session."));
      Object.entries(waitingList).sort((a,b)=>b[1].length-a[1].length).forEach(([actName,wl])=>{
        const act=acts.find(a=>a.n===actName);
        const cap=act?(act.cap||0):0;
        wlCard.appendChild(h("div",{style:{padding:"6px 0",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("div",null,
            h("span",{style:{fontWeight:600,color:gc(actName)}},actName),
            h("span",{style:{fontSize:"11px",color:"var(--text3)",marginLeft:"8px"}},"(capacity: "+cap+", "+wl.length+" on waiting list)")
          ),
          h("button",{className:"btn btn-ghost btn-xs",onClick:()=>{
            const names=wl.map(w=>{const p=findPupilByEmail(w.email);return p?((p.pref||p.forename||"")+" "+(p.surname||"")).trim():w.email;}).join("\n");
            navigator.clipboard.writeText(actName+" — Waiting List\n"+names).then(()=>toast("Waiting list copied"));
          }},"Copy list")
        ));
      });
      el.appendChild(wlCard);
    }
  }
}

function renderAllocResults(el){
  if(!window._resultsSub)window._resultsSub="results";
  const subNav=h("div",{className:"flex mb-12",style:{gap:"4px"}});
  [["results","📊 Results & Overrides"],["bydate","📅 Results by Date"],["waiting","⏳ Waiting Lists"]].forEach(([id,label])=>{
    subNav.appendChild(h("button",{className:"btn "+(window._resultsSub===id?"btn-primary":"btn-ghost"),onClick:()=>{window._resultsSub=id;
      const main=document.querySelector(".main");if(main){main.innerHTML="";renderAlloc(main);}
    }},label));
  });
  el.appendChild(subNav);
  if(window._resultsSub==="waiting"){renderWaitingLists(el);return;}
  if(window._resultsSub==="bydate"){renderResultsByDate(el);return;}

  const allEmails=new Set([...pupils.map(p=>normEmail(p.email)),...(allocRes||[]).map(r=>normEmail(r.email)),...formData.map(f=>normEmail(f.email))].filter(Boolean));
  const s1Di=dates.map((_,i)=>i).filter(i=>dates[i].half==="S1");
  const s2Di=dates.map((_,i)=>i).filter(i=>dates[i].half==="S2");
  const s1Acts=[...acts.filter(a=>a.di.some(d=>s1Di.includes(d))).map(a=>a.n),"Out of school","Supported Study"].sort();
  const s2Acts=[...acts.filter(a=>a.di.some(d=>s2Di.includes(d))).map(a=>a.n),"Out of school","Supported Study"].sort();
  const capUsed={s1:{},s2:{}};
  if(allocRes){allocRes.filter(r=>r.alloc).forEach(r=>{const ht=r.half.toLowerCase();capUsed[ht][r.alloc]=(capUsed[ht][r.alloc]||0)+1;});}

  let allRows=[...allEmails].map(ne=>{
    const s1=allocRes?allocRes.find(r=>normEmail(r.email)===ne&&r.half==="S1"):null;
    const s2=allocRes?allocRes.find(r=>normEmail(r.email)===ne&&r.half==="S2"):null;
    const pupil=pupils.find(p=>normEmail(p.email)===ne);
    const fd=formData.find(f=>normEmail(f.email)===ne);
    const email=pupil?pupil.email:(fd?fd.email:ne);
    return{email,forename:pupil?(pupil.pref||pupil.forename||""):"",surname:pupil?(pupil.surname||""):"",yearGroup:pupil?(pupil.yg||""):"",house:normaliseHouse(fd?(fd.house||""):(pupil?(pupil.house||""):"")),
      s1Act:s1?(s1.alloc||"\u2014"):"\u2014",s1St:s1?(s1.st||"\u2014"):(fd?"\u2014":""),
      s2Act:s2?(s2.alloc||"\u2014"):"\u2014",s2St:s2?(s2.st||"\u2014"):(fd?"\u2014":""),
      s1c1:fd?(fd.s1c1||""):"",s1c2:fd?(fd.s1c2||""):"",s1c3:fd?(fd.s1c3||""):"",
      s2c1:fd?(fd.s2c1||""):"",s2c2:fd?(fd.s2c2||""):"",s2c3:fd?(fd.s2c3||""):"",hasForm:!!fd};
  });

  if(!window._colFilters)window._colFilters={};
  let rows=[...allRows];

function runAllocEngineV12(){
  const log=[];if(!formData.length){allocLog=["ERROR: No form data loaded. Go to Paste Responses first."];return;}
  const allRes=[];
  waitingList={};

  // Step 0: Build fuzzy name map for all form choices
  const nameFixLog=[];
  function resolveActName(rawName,halfLabel){
    if(!rawName)return null;
    const exact=acts.find(a=>a.n===rawName);
    if(exact)return exact.n;
    const fuzzy=findActByName(rawName);
    if(fuzzy){
      nameFixLog.push("  AUTO-MATCHED: \""+rawName+"\" → \""+fuzzy.n+"\" in "+halfLabel);
      return fuzzy.n;
    }
    return null; // truly not found
  }

  ["S1","S2"].forEach(half=>{
    const halfLabel=half==="S1"?"Summer 1":"Summer 2";
    log.push("═══════════════════════════════════════════");
    log.push("ALLOCATING: "+halfLabel+" ("+formData.length+" pupils)");
    log.push("═══════════════════════════════════════════");

    const halfDi=dates.map((_,i)=>i).filter(i=>dates[i].half===half);
    // Include ALL activities running this half — cap=0 means TBC, excluded from engine but warned
    const allHalfActs=acts.filter(a=>a.di.some(d=>halfDi.includes(d)));
    const capU={},capM={};
    allHalfActs.forEach(a=>{if(a.cap>0){capU[a.n]=0;capM[a.n]=a.cap;}});
    const hActs=allHalfActs.filter(a=>a.cap>0);
    const vn=new Set(hActs.map(a=>a.n));
    allHalfActs.filter(a=>!a.cap).forEach(a=>log.push("WARNING: "+a.n+" skipped (capacity TBC)"));

    // Step 1: Apply manual overrides (including "Out of school")
    const overrides=allocOverrides[half.toLowerCase()]||{};
    const overriddenEmails=new Set();
    Object.entries(overrides).forEach(([email,activity])=>{
      if(activity){
        const origFd=formData.find(f=>normEmail(f.email)===normEmail(email));
        allRes.push({email:origFd?origFd.email:email,alloc:activity,lvl:0,st:"OVERRIDE",half,isOverride:true,
          s1c1:"",s1c2:"",s1c3:"",s2c1:"",s2c2:"",s2c3:"",...(origFd||{})});
        if(capU[activity]!==undefined)capU[activity]=(capU[activity]||0)+1;
        overriddenEmails.add(normEmail(email));
        log.push("  OVERRIDE: "+email+" → "+activity);
      }
    });

    // Log any fuzzy matches found
    if(nameFixLog.length>0){nameFixLog.forEach(l=>log.push(l));nameFixLog.length=0;}

    // Step 2: Score and sort remaining pupils
    const remaining=formData.filter(p=>!overriddenEmails.has(normEmail(p.email))).map(p=>{
      const tsScore=new Date(p.timestamp||0).getTime()||0;
      let disappointmentCount=0;
      allocHistory.forEach(h2=>{if(normEmail(h2.email)===normEmail(p.email)&&h2.choiceIndex>0)disappointmentCount++;});
      const otherHalfRes=allRes.find(r=>normEmail(r.email)===normEmail(p.email)&&r.half!==half);
      if(otherHalfRes&&otherHalfRes.lvl>1)disappointmentCount++;
      const actHistoryCount={};
      allocHistory.forEach(h2=>{if(normEmail(h2.email)===normEmail(p.email)){actHistoryCount[h2.activity]=(actHistoryCount[h2.activity]||0)+1;}});
      // FIX Bug 4: Only count other-half result in history if it would actually cause oversubscription
      // — don't add it unconditionally as it incorrectly penalises S2 for S1 allocations
      // (handled at allocation time below instead)
      return{...p,tsScore,disappointmentCount,actHistoryCount,otherHalfAlloc:otherHalfRes?otherHalfRes.alloc:null};
    });

    remaining.sort((a,b)=>{
      if(b.disappointmentCount!==a.disappointmentCount)return b.disappointmentCount-a.disappointmentCount;
      return a.tsScore-b.tsScore;
    });

    // Step 3: Allocate with fuzzy matching
    remaining.forEach(p=>{
      // FIX Bug 2: only use half-specific choices — do NOT fall back to c1/c2/c3 (which are S1 fields)
      // If a pupil has no S2 choices, they should be unmatched, not given their S1 choices
      const rawC1=half==="S1"?(p.s1c1||p.c1||""):(p.s2c1||"");
      const rawC2=half==="S1"?(p.s1c2||p.c2||""):(p.s2c2||"");
      const rawC3=half==="S1"?(p.s1c3||p.c3||""):(p.s2c3||"");
      const ch=[rawC1,rawC2,rawC3].map(c=>{
        if(!c)return null;
        const resolved=resolveActName(c,halfLabel);
        if(!resolved&&c)log.push("  "+p.email+": \""+c+"\" NOT FOUND in "+halfLabel+" (not in activity list)");
        return resolved;
      }).filter(Boolean);
      let alloc=null,lvl=null;

      for(let i=0;i<ch.length;i++){
        if(!vn.has(ch[i]))continue; // not running this half
        const cap=capM[ch[i]],used=capU[ch[i]]||0;
        if(used>=cap){
          log.push("  "+p.email+": "+ch[i]+" FULL ("+used+"/"+cap+")");
          // Add to waiting list
          if(!waitingList[ch[i]])waitingList[ch[i]]=[];
          waitingList[ch[i]].push({email:p.email,choiceIndex:i,half});
          continue;
        }
        if(i===0&&(p.actHistoryCount[ch[i]]||0)>0){
          // FIX Bug 4: also count other-half alloc for same activity in oversubscription check
          const otherHalfCount=(p.otherHalfAlloc===ch[i])?1:0;
          const histCount=(p.actHistoryCount[ch[i]]||0)+otherHalfCount;
          if(histCount>0){
            const demand=remaining.filter(r=>{const rc=half==="S1"?(r.s1c1||r.c1):(r.s2c1||"");return resolveActName(rc,halfLabel)===ch[i];}).length;
            if(demand>cap){
              // FIX Bug 3: don't skip to unmatched — fall through to 2nd/3rd choice instead
              log.push("  "+p.email+": REPEAT PENALTY on "+ch[i]+" (done before, oversubscribed "+demand+"/"+cap+") — trying next choice");
              if(!waitingList[ch[i]])waitingList[ch[i]]=[];
              waitingList[ch[i]].push({email:p.email,choiceIndex:i,half});
              continue; // try next choice in the loop
            }
          }
        }
        alloc=ch[i];lvl=i+1;capU[ch[i]]=used+1;break;
      }
      if(alloc){
        log.push("  "+p.email+" → "+alloc+" (choice "+lvl+(p.disappointmentCount>0?" · fairness boost":"")+")");
        allRes.push({...p,alloc,lvl,st:lvl===1?"1ST":lvl===2?"2ND":"3RD",half,isOverride:false});
      }else{
        const choicesStr=ch.length>0?ch.join(", "):"no valid choices";
        log.push("  "+p.email+": UNMATCHED (wanted: "+choicesStr+")");
        allRes.push({...p,alloc:null,lvl:null,st:"UNMATCHED",half,isOverride:false});
      }
    });

    log.push("");
    const s1c=allRes.filter(r=>r.half===half&&r.lvl===1).length;
    const s2c=allRes.filter(r=>r.half===half&&r.lvl===2).length;
    const s3c=allRes.filter(r=>r.half===half&&r.lvl===3).length;
    const um=allRes.filter(r=>r.half===half&&!r.alloc).length;
    const ov=allRes.filter(r=>r.half===half&&r.isOverride).length;
    log.push("SUMMARY ("+halfLabel+"): "+s1c+" 1st | "+s2c+" 2nd | "+s3c+" 3rd | "+ov+" overrides | "+um+" unmatched");
    log.push("CAPACITY: "+Object.entries(capU).filter(([,v])=>v>0).map(([k,v])=>k+": "+v+"/"+capM[k]).join(" | "));
    // Demand report
    const demand={};formData.forEach(p=>{
      const c=half==="S1"?(p.s1c1||p.c1||""):(p.s2c1||p.c1||"");
      const resolved=resolveActName(c,halfLabel);if(resolved){demand[resolved]=(demand[resolved]||0)+1;}
    });
    const hotActs=Object.entries(demand).filter(([k,v])=>v>(capM[k]||0)).sort((a,b)=>b[1]-a[1]);
    if(hotActs.length>0){
      log.push("OVERSUBSCRIBED: "+hotActs.map(([k,v])=>k+" ("+v+" wanted, "+capM[k]+" places)").join(" | "));
    }
    log.push("");
  });

  allocRes=allRes;
  allocLog=log;
  saveAll();
}

// Silent re-run triggered automatically when overrides change
// Only runs if formData exists; debounced 800ms to batch rapid changes
let _allocDbc=null;
function autoRealloc(msg){
  if(!formData||!formData.length)return;
  clearTimeout(_allocDbc);
  _allocDbc=setTimeout(()=>{
    runAllocEngineV12();
    toast(msg||"Allocation updated ✓");
  },800);
}

function renderPupils(el){
  el.appendChild(h("div",{className:"page-header"},h("h2",null,"Pupils ("+pupils.length+")"),h("p",null,"Import pupil data. Columns: Tutor, Forename, Preferred Forename, Surname, Year Group, House, Status, Email")));

  const ygCounts={};pupils.forEach(p=>{ygCounts[p.yg]=(ygCounts[p.yg]||0)+1;});

  // Stats
  if(pupils.length>0){
    const statsRow=h("div",{className:"stats-row mb-16"});
    statsRow.appendChild(h("div",{className:"stat-card"},h("div",{className:"stat-val"},pupils.length),h("div",{className:"stat-label"},"Total Pupils")));
    Object.entries(ygCounts).sort((a,b)=>{const o=["Year 9","Year 10","Year 11","Year 12","Year 13"];const ia=o.findIndex(x=>a[0].includes(x.replace("Year ","")));const ib=o.findIndex(x=>b[0].includes(x.replace("Year ","")));if(ia>=0&&ib>=0)return ia-ib;return a[0].localeCompare(b[0]);}).forEach(([yg,c])=>{
      statsRow.appendChild(h("div",{className:"stat-card"},h("div",{className:"stat-val"},c),h("div",{className:"stat-label"},yg||"Unknown")));
    });
    el.appendChild(statsRow);
  }

  // Import card
  const importCard=h("div",{className:"card card-pad mb-16"});
  importCard.appendChild(h("label",{className:"field-label"},"Paste pupil data (tab or comma separated, first row = header)"));
  importCard.appendChild(h("p",{style:{fontSize:"11px",color:"var(--text3)",marginBottom:"8px"}},"Expected columns: Tutor · Forename · Preferred Forename · Surname · Year Group · House · Status · Email"));
  const ta=h("textarea",{rows:6,placeholder:"Tutor\tForename\tPreferred Forename\tSurname\tYear Group\tHouse\tStatus\tEmail\nSMITH\tJames\tJamie\tBrown\tYear 10\tSomerset\tBoarding\tjbrown@clayesmore.com",style:{marginBottom:"10px"}});
  importCard.appendChild(ta);

  const btnRow=h("div",{className:"flex"});
  btnRow.appendChild(h("button",{className:"btn btn-primary",onClick:()=>{
    const raw=ta.value.trim();
    if(!raw){toast("Nothing to import","err");return;}
    const lines=raw.split("\n").filter(l=>l.trim());
    if(lines.length<2){toast("Need at least a header row and one data row","err");return;}
    const sep=lines[0].includes("\t")?"\t":",";
    // Detect column order from header
    const header=lines[0].split(sep).map(x=>x.replace(/^"|"$/g,"").trim().toLowerCase());
    const colMap={
      tutor:["tutor","form","form tutor","tutor group","reg","registration","pastoral tutor","form teacher"],
      forename:["forename","first name","firstname","given name","christian name","preferred forename","first"],
      pref:["preferred forename","preferred name","preferred","pref","known as","goes by","nickname","preferred first name"],
      surname:["surname","last name","lastname","family name","last"],
      yg:["year group","year","form year","yeargroup","nc year","yr group","yr grp","year grp","reg group","registration group","form group","academic year","year of entry","yg","yr","y group"],
      house:["house","boarding house","house group","pastoral house"],
      status:["status","boarding status","day/boarding","board/day","type","pupil type"],
      email:["email","email address","e-mail","e mail","school email","pupil email"]
    };
    function findCol(keys){
      for(const k of keys){const idx=header.indexOf(k);if(idx>=0)return idx;}
      return -1;
    }
    const ci={
      tutor:findCol(colMap.tutor),
      forename:findCol(colMap.forename),
      pref:findCol(colMap.pref),
      surname:findCol(colMap.surname),
      yg:findCol(colMap.yg),
      house:findCol(colMap.house),
      status:findCol(colMap.status),
      email:findCol(colMap.email)
    };

    // Fallback: assume positional order if no headers match
    // Order: Tutor(0) Forename(1) Preferred(2) Surname(3) YG(4) House(5) Status(6) Email(7)
    if(ci.email<0&&ci.surname<0){
      ci.tutor=0;ci.forename=1;ci.pref=2;ci.surname=3;ci.yg=4;ci.house=5;ci.status=6;ci.email=7;
    }

    const imported=[];
    lines.slice(1).forEach(l=>{
      const c=l.split(sep).map(x=>x.replace(/^"|"$/g,"").trim());
      if(c.length<2)return;
      const get=(key)=>ci[key]>=0&&ci[key]<c.length?c[ci[key]]:"";
      const email=get("email");
      // Accept rows with or without email (email can be in any column)
      imported.push({
        tutor:get("tutor"),
        forename:get("forename"),
        pref:get("pref"),
        surname:get("surname"),
        yg:normaliseYg(get("yg")),
        house:normaliseHouse(get("house")),
        status:get("status"),
        email:email
      });
    });
    if(imported.length===0){toast("No valid rows found — check format","err");return;}
    const importEmails=new Set(imported.map(p=>normEmail(p.email)).filter(Boolean));
    const existingPupilMap=new Map(pupils.map(p=>[normEmail(p.email),p]));
    // Update existing & add new
    let added=0,updated=0;
    imported.forEach(p=>{
      const ne=normEmail(p.email);
      if(ne&&existingPupilMap.has(ne)){
        const existing=existingPupilMap.get(ne);
        const medBak=existing.med,dietBak=existing.diet,consentBak=existing.consent||{};
        Object.assign(existing,p);
        if(!p.med)existing.med=medBak;
        if(!p.diet)existing.diet=dietBak;
        existing.consent=consentBak;
        updated++;
      }else{
        existingPupilMap.set(ne||("nomail-"+Date.now()+Math.random()),p);
        added++;
      }
    });
    // Remove pupils whose email is not in the new list (if list has emails)
    let removed=0;
    if(importEmails.size>0){
      const before=existingPupilMap.size;
      for(const [k,p] of existingPupilMap){
        const ne=normEmail(p.email);
        if(ne&&!importEmails.has(ne)){existingPupilMap.delete(k);removed++;}
      }
    }
    pupils=[...existingPupilMap.values()];saveAll();
    toast(added+" added, "+updated+" updated"+(removed>0?", "+removed+" removed":"")+" ("+pupils.length+" total)");
    render();
  }},"Import & Sync List"));
  btnRow.appendChild(h("button",{className:"btn btn-ghost",onClick:()=>{
    if(!confirm("Clear all "+pupils.length+" pupils?"))return;
    pupils=[];saveAll();scrollPreservingRender();
  }},"Clear All"));
  importCard.appendChild(btnRow);
  el.appendChild(importCard);

  if(pupils.length>0){
    // Filter controls
    if(!window._pupilFilter)window._pupilFilter="";
    if(!window._pupilYgFilter)window._pupilYgFilter="all";
    const filterRow=h("div",{className:"flex mb-12",style:{gap:"8px"}});
    const pupilFilterInp=h("input",{placeholder:"Filter by name, email, house…",value:window._pupilFilter||"",style:{flex:1,minWidth:"200px"}});
    pupilFilterInp.addEventListener("input",e=>{
      window._pupilFilter=e.target.value;
      const main=document.querySelector(".main");
      if(main){const pos=pupilFilterInp.selectionStart;main.innerHTML="";renderPupils(main);
        const newInp=main.querySelector("input[placeholder*='Filter']");
        if(newInp){newInp.focus();newInp.selectionStart=newInp.selectionEnd=pos;}
      }
    });
    filterRow.appendChild(pupilFilterInp);
    const ygs=ygSort([...new Set(pupils.map(p=>p.yg).filter(Boolean))]);
    if(ygs.length>0){
      const ygSel=h("select",{onChange:e=>{window._pupilYgFilter=e.target.value;render();}});
      ygSel.appendChild(h("option",{value:"all"},"All Year Groups"));
      ygs.forEach(yg=>{const o=h("option",{value:yg},yg);if(window._pupilYgFilter===yg)o.selected=true;ygSel.appendChild(o);});
      filterRow.appendChild(ygSel);
    }
    el.appendChild(filterRow);

    let filtered=pupils;
    if(window._pupilFilter){const ft=window._pupilFilter.toLowerCase();filtered=filtered.filter(p=>(p.forename||"").toLowerCase().includes(ft)||(p.pref||"").toLowerCase().includes(ft)||(p.surname||"").toLowerCase().includes(ft)||(p.email||"").toLowerCase().includes(ft)||(p.house||"").toLowerCase().includes(ft)||(p.tutor||"").toLowerCase().includes(ft));}

    if(!window._pupilSortDir)window._pupilSortDir="asc";
    const psCol=window._pupilSortCol,psDir=window._pupilSortDir;
    filtered.sort((a,b)=>{let va=(a[psCol]||"").toLowerCase(),vb=(b[psCol]||"").toLowerCase();return(va<vb?-1:va>vb?1:0)*(psDir==="asc"?1:-1);});

    const tableCard=h("div",{className:"card"});
    const tHdr=h("div",{className:"card-header flex-between"});
    tHdr.appendChild(h("span",{className:"card-title"},filtered.length+" of "+pupils.length+" pupils shown"));
    tHdr.appendChild(h("button",{className:"btn btn-ghost btn-sm",onClick:()=>{
      const rows=[["Tutor","Forename","Preferred","Surname","Year","House","Status","Email"],...filtered.map(p=>[p.tutor,p.forename,p.pref,p.surname,p.yg,p.house,p.status,p.email])];
      navigator.clipboard.writeText(rows.map(r=>r.join("\t")).join("\n")).then(()=>toast("Pupils copied to clipboard"));
    }},"📋 Copy"));
    tableCard.appendChild(tHdr);
    const tw=h("div",{style:{maxHeight:"60vh",overflow:"auto"}});
    const tbl=h("table",null);
    function pSortTh(col,label){
      const isSorted=psCol===col;
      return h("th",{style:{cursor:"pointer",userSelect:"none",whiteSpace:"nowrap"},onClick:()=>{
        if(window._pupilSortCol===col)window._pupilSortDir=window._pupilSortDir==="asc"?"desc":"asc";
        else{window._pupilSortCol=col;window._pupilSortDir="asc";}
        const m=document.querySelector(".main");if(m){m.innerHTML="";renderPupils(m);}
      }},label,h("span",{style:{fontSize:"8px",opacity:isSorted?1:0.3,marginLeft:"2px"}},isSorted?(psDir==="asc"?"↑":"↓"):"↕"));

            return[(p.surname||""),(p.pref||p.forename||""),(p.yg||""),(p.house||""),c1,c2,c3].join("\t");
          });

      const tb=h("tbody",null);
      [...choosers].sort((a,b)=>{const pa=findPupilByEmail(a.email)||{},pb=findPupilByEmail(b.email)||{};return(pa.surname||"").localeCompare(pb.surname||"");}).forEach(f=>{

        const c1=half==="S1"?f.s1c1:f.s2c1,c2=half==="S1"?f.s1c2:f.s2c2,c3=half==="S1"?f.s1c3:f.s2c3;
        tb.appendChild(h("tr",null,

function generateRASheet(actName,dateIdx){
  const out=document.getElementById("ra-output");if(!out)return;out.innerHTML="";
  const act=acts.find(a=>a.n===actName);if(!act)return;
  // Get allocated pupils
  if(!allocRes){out.appendChild(h("div",{className:"alert alert-warn"},"Run allocation first."));return;}
  // Determine which half-terms this activity runs in
  let relevantHalves=[];
  if(dateIdx!==""){
    relevantHalves=[dates[Number(dateIdx)]?.half];
  }else{
    relevantHalves=[...new Set(act.di.map(i=>dates[i]?.half).filter(Boolean))];
  }
  const matchedEmails=new Set();
  allocRes.forEach(r=>{if(r.alloc===actName&&relevantHalves.includes(r.half))matchedEmails.add(r.email);});
  const pupilList=[...matchedEmails].map(email=>{
    const p=findPupilByEmail(email);
    return{email,forename:p?(p.pref||p.forename||""):"",surname:p?(p.surname||""):"",yg:p?(p.yg||""):"",house:p?(p.house||""):"",med:p?(p.med||""):"",diet:p?(p.diet||""):"",status:p?(p.status||""):""};
  }).sort((a,b)=>a.surname.localeCompare(b.surname));

  const leader=act.lead?staff.find(s=>s.c===act.lead):null;
  // Header info
  const info=h("div",{className:"card card-pad mb-12"});

  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"auto 1fr",gap:"4px 12px",fontSize:"12px"}});
  [["Venue:",act.v||"TBC"],["Group Leader:",leader?(leader.n+" ("+leader.c+")"):"TBC"],["Dates:",dateIdx!==""?dates[Number(dateIdx)]?.label:act.di.map(i=>dates[i]?.label).join(", ")],
   ["Session:",act.sess||"A+B"],["Transport:",act.mb?"Minibus":"N/A"],["RA Status:",act.ra||"—"],["Provider RA:",act.provRA||"N/A"]
  ].forEach(([l,v])=>{grid.appendChild(h("div",{style:{color:"var(--text3)",fontWeight:500}},l));grid.appendChild(h("div",null,v));});
  info.appendChild(grid);out.appendChild(info);

  // Pupil table
  const card=h("div",{className:"card"});
  const hdr=h("div",{className:"card-header flex-between"});
  hdr.appendChild(h("span",{className:"card-title"},pupilList.length+" pupils"));
  hdr.appendChild(h("button",{className:"btn btn-ghost btn-sm",onClick:()=>{
    const header="Surname\tForename\tYear\tHouse\tDay/Boarder\tMedical\tDietary";
    const rows=pupilList.map(p=>[p.surname,p.forename,p.yg,p.house,p.status,p.med,p.diet].join("\t"));
    navigator.clipboard.writeText(actName+" — Pupil List for RA\n"+header+"\n"+rows.join("\n")).then(()=>toast("Pupil list copied"));
  }},"📋 Copy for RA"));
  card.appendChild(hdr);
  const tw=h("div",{style:{overflow:"auto"}});
  const t=h("table",null);
  t.appendChild(h("thead",null,h("tr",null,...["Surname","Forename","Year","House","Day/Board","Medical","Dietary"].map(x=>h("th",null,x)))));
  const tb=h("tbody",null);
  pupilList.forEach(p=>{
    tb.appendChild(h("tr",null,
      h("td",{style:{fontWeight:600}},p.surname),h("td",null,p.forename),h("td",null,displayYg(p.yg)),h("td",null,p.house),h("td",null,p.status),
      h("td",{style:{fontSize:"11px",color:p.med?"var(--red)":"var(--text3)",maxWidth:"200px",whiteSpace:"normal"}},p.med||"—"),
      h("td",{style:{fontSize:"11px",color:p.diet?"var(--amber)":"var(--text3)",maxWidth:"200px",whiteSpace:"normal"}},p.diet||"—")
    ));
  });
  t.appendChild(tb);tw.appendChild(t);card.appendChild(tw);out.appendChild(card);
